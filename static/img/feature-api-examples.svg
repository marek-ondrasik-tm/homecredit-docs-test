<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E11931;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FC3A51;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#bgGrad2)"/>
  
  <!-- Code editor window - centered -->
  <g transform="translate(50, 50)">
    <!-- Window frame -->
    <rect x="0" y="0" width="500" height="300" rx="8" fill="white" stroke="#E11931" stroke-width="2"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="500" height="40" rx="8" fill="url(#redGrad2)"/>
    <circle cx="15" cy="20" r="6" fill="white" opacity="0.8"/>
    <circle cx="35" cy="20" r="6" fill="white" opacity="0.8"/>
    <circle cx="55" cy="20" r="6" fill="white" opacity="0.8"/>
    <text x="80" y="27" font-family="Source Sans Pro, sans-serif" font-size="14" font-weight="600" fill="white">API Request Example</text>
    
    <!-- Code content -->
    <g transform="translate(20, 60)">
      <!-- Line numbers -->
      <text x="0" y="0" font-family="monospace" font-size="14" fill="#6c757d">1</text>
      <text x="0" y="25" font-family="monospace" font-size="14" fill="#6c757d">2</text>
      <text x="0" y="50" font-family="monospace" font-size="14" fill="#6c757d">3</text>
      <text x="0" y="75" font-family="monospace" font-size="14" fill="#6c757d">4</text>
      <text x="0" y="100" font-family="monospace" font-size="14" fill="#6c757d">5</text>
      <text x="0" y="125" font-family="monospace" font-size="14" fill="#6c757d">6</text>
      
      <!-- Code -->
      <text x="30" y="0" font-family="monospace" font-size="14" fill="#E11931">POST</text>
      <text x="80" y="0" font-family="monospace" font-size="14" fill="#495057">/api/v1/applications</text>
      
      <text x="30" y="25" font-family="monospace" font-size="14" fill="#6c757d">{</text>
      
      <text x="58" y="50" font-family="monospace" font-size="14" fill="#E11931">"orderId":</text>
      <text x="148" y="50" font-family="monospace" font-size="14" fill="#28a745">"12345"</text>

      <text x="30" y="75" font-family="monospace" font-size="14" fill="#6c757d">}</text>
      
      <text x="30" y="100" font-family="monospace" font-size="14" fill="#28a745">200 OK</text>
      
      <text x="30" y="125" font-family="monospace" font-size="14" fill="#6c757d">{</text>

      <text x="58" y="150" font-family="monospace" font-size="14" fill="#495057">"applicationId":</text>
      <text x="200" y="150" font-family="monospace" font-size="14" fill="#28a745">"abc-123"</text>
      <text x="30" y="175" font-family="monospace" font-size="14" fill="#6c757d">}</text>

    </g>
  </g>
  
</svg>
