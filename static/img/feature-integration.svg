<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E11931;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FC3A51;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#bgGrad5)"/>
  
  <!-- Integration flow diagram -->
  <g transform="translate(50, 100)">
    <!-- E-commerce platform -->
    <rect x="0" y="0" width="120" height="100" rx="8" fill="white" stroke="#E11931" stroke-width="2"/>
    <rect x="10" y="10" width="100" height="30" rx="4" fill="#f8f9fa"/>
    <circle cx="40" cy="25" r="8" fill="#E11931"/>
    <circle cx="60" cy="25" r="8" fill="#E11931"/>
    <circle cx="80" cy="25" r="8" fill="#E11931"/>
    <text x="60" y="60" font-family="Source Sans Pro, sans-serif" font-size="12" font-weight="600" fill="#495057" text-anchor="middle" dominant-baseline="middle">E-commerce</text>
    <text x="60" y="75" font-family="Source Sans Pro, sans-serif" font-size="12" font-weight="600" fill="#495057" text-anchor="middle" dominant-baseline="middle">Platform</text>
    
    <!-- Arrow -->
    <path d="M130 50 L200 50" stroke="#E11931" stroke-width="3" stroke-linecap="round"/>
    <path d="M190 45 L200 50 L190 55" stroke="#E11931" stroke-width="3" stroke-linecap="round" fill="none"/>
    
    <!-- Home Credit API -->
    <rect x="210" y="0" width="120" height="100" rx="8" fill="url(#redGrad5)" stroke="#E11931" stroke-width="2"/>
    <text x="270" y="40" font-family="Source Sans Pro, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">Home Credit</text>
    <text x="270" y="60" font-family="Source Sans Pro, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">API</text>
    
    <!-- Arrow -->
    <path d="M340 50 L410 50" stroke="#E11931" stroke-width="3" stroke-linecap="round"/>
    <path d="M400 45 L410 50 L400 55" stroke="#E11931" stroke-width="3" stroke-linecap="round" fill="none"/>
    
    <!-- Customer -->
    <rect x="420" y="0" width="120" height="100" rx="8" fill="white" stroke="#E11931" stroke-width="2"/>
    <!-- User icon -->
    <g transform="translate(480, 35)">
      <!-- Head -->
      <circle cx="0" cy="-8" r="10" fill="#E11931"/>
      <!-- Body -->
      <path d="M-15 8 Q-15 0 0 0 Q15 0 15 8 L15 20 L-15 20 Z" fill="#E11931"/>
    </g>
    <text x="480" y="70" font-family="Source Sans Pro, sans-serif" font-size="12" font-weight="600" fill="#495057" text-anchor="middle" dominant-baseline="middle">Customer</text>
  </g>
  
  <!-- Data flow lines -->
  <g transform="translate(50, 220)" opacity="0.3">
    <path d="M0 0 Q270 50 540 0" stroke="#E11931" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
    <path d="M540 0 Q270 -50 0 0" stroke="#E11931" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Integration features -->
  <g transform="translate(100, 280)">
    <circle cx="0" cy="0" r="8" fill="#E11931"/>
    <text x="20" y="5" font-family="Source Sans Pro, sans-serif" font-size="12" fill="#495057">Secure Authentication</text>
    
    <circle cx="0" cy="30" r="8" fill="#E11931"/>
    <text x="20" y="35" font-family="Source Sans Pro, sans-serif" font-size="12" fill="#495057">Real-time Processing</text>
    
    <circle cx="300" cy="0" r="8" fill="#E11931"/>
    <text x="320" y="5" font-family="Source Sans Pro, sans-serif" font-size="12" fill="#495057">Payment Integration</text>
    
    <circle cx="300" cy="30" r="8" fill="#E11931"/>
    <text x="320" y="35" font-family="Source Sans Pro, sans-serif" font-size="12" fill="#495057">Order Management</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="550" cy="50" r="25" fill="#E11931" opacity="0.1"/>
  <circle cx="50" cy="350" r="30" fill="#FC3A51" opacity="0.1"/>
</svg>
