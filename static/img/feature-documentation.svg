<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E11931;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FC3A51;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="400" fill="url(#bgGrad)"/>
  
  <!-- Documentation book icon - centered -->
  <g transform="translate(200, 60)">
    <!-- Book -->
    <rect x="0" y="0" width="200" height="160" rx="8" fill="white" stroke="#E11931" stroke-width="3"/>
    <rect x="20" y="20" width="160" height="20" rx="4" fill="url(#redGrad)"/>
    <rect x="20" y="50" width="140" height="12" rx="2" fill="#dee2e6"/>
    <rect x="20" y="70" width="160" height="12" rx="2" fill="#dee2e6"/>
    <rect x="20" y="90" width="120" height="12" rx="2" fill="#dee2e6"/>
    <rect x="20" y="110" width="150" height="12" rx="2" fill="#dee2e6"/>
    <rect x="20" y="130" width="100" height="12" rx="2" fill="#dee2e6"/>
  </g>
  
  <!-- Code brackets - positioned relative to book -->
  <g transform="translate(420, 80)">
    <!-- Left angle bracket < -->
    <path d="M0 15 L15 0 L15 10 L8 15 L15 20 L15 30 L0 15 Z" fill="#E11931" opacity="0.8"/>
    <!-- Right angle bracket > -->
    <path d="M60 15 L45 0 L45 10 L52 15 L45 20 L45 30 L60 15 Z" fill="#E11931" opacity="0.8"/>
    <text x="30" y="15" font-family="Source Sans Pro, sans-serif" font-size="14" font-weight="600" fill="#E11931" text-anchor="middle" dominant-baseline="central">API</text>
  </g>
  
  <!-- Integration arrows - centered at bottom -->
  <g transform="translate(150, 260)">
    <circle cx="50" cy="30" r="25" fill="url(#redGrad)"/>
    <path d="M75 30 L125 30" stroke="#E11931" stroke-width="3" stroke-linecap="round"/>
    <path d="M115 25 L125 30 L115 35" stroke="#E11931" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="150" cy="30" r="25" fill="white" stroke="#E11931" stroke-width="3"/>
    <path d="M175 30 L225 30" stroke="#E11931" stroke-width="3" stroke-linecap="round"/>
    <path d="M215 25 L225 30 L215 35" stroke="#E11931" stroke-width="3" stroke-linecap="round" fill="none"/>
    <circle cx="250" cy="30" r="25" fill="url(#redGrad)"/>
    
    <!-- Icons inside circles - centered -->
    <text x="50" y="30" font-family="Arial" font-size="20" fill="white" text-anchor="middle" dominant-baseline="central">E</text>
    <text x="150" y="30" font-family="Arial" font-size="18" font-weight="600" fill="#E11931" text-anchor="middle" dominant-baseline="central">HC</text>
    <!-- Checkmark - centered -->
    <g transform="translate(250, 30)">
      <path d="M-8 -2 L-2 4 L8 -6" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="30" fill="#E11931" opacity="0.1"/>
  <circle cx="550" cy="350" r="40" fill="#FC3A51" opacity="0.1"/>
</svg>
