  - name: Scoring resources
    x-displayName: Zdroje bodování
    description: >
      Služby, které umožňují partnerským e-shopům zjistit pravděpodobnost

      *schválení žádosti*.


      ### Precheck


      Jednoduchá operace pro předběžné hodnocení zákazníků. Vrátí možnou výši
      úvěru zákazníka

      může získat. Nejlépe se hodí pro identifikaci klientů, kteří budou
      pravděpodobně odmítnuti.

      Vezměte v úvahu, že kladné doporučení nemůže zákazníkovi zaručit schválení
      jako výsledek

      je založen pouze na několika základních informacích o zákazníkovi.


      Zdroj musí být volán s platným přístupovým tokenem (viz část
      [Zabezpečení](./security))

      z vašeho serveru. Pokud jej plánujete integrovat do klientského toku, měli
      byste implementovat koncový bod REST

      navázaný na relaci nákupního košíku, který bude použit jako proxy pro
      volání HC API -

      **NIKDY nevkládejte přístupový token přímo na stranu klienta**


      Vysvětlení možných chybových kódů:


      | Stavový kód | Kód | Vysvětlení|

      | ----------- | --------------- | -------------------- |

      | 400 | INVALID_REQUEST | Požadavek nebyl správně naformátován (chybná
      syntaxe požadavku, příliš velká velikost atd.) |

      | 500 | FAILURE | Interní selhání |


      ### MultiPrecheck


      Multi Precheck je základní Precheck spuštěný na mnoha klientech. Obvykle
      se používá mimo businness

      hodin. Operace je asynchronní, partner získá pouze jedinečný identifikátor
      dávky

      výsledek je k dispozici ve zdroji Multi precheck result (viz [Výsledek MultiPrecheck](#výsledek-multiprecheck))


      Prostředek musí být volán s platným přístupovým tokenem (viz část
      [Zabezpečení](./security))

      z vašeho serveru. Pokud jej plánujete začlenit do klientského toku, měli
      byste implementovat koncový bod REST

      navázaný na relaci nákupního košíku, který bude použit jako proxy pro
      volání rozhraní HC API -

      **NIKDY nevkládejte přístupový token přímo na stranu klienta**


      Vysvětlení možných chybových kódů:


      | Stavový kód | Kód | Vysvětlení|

      | ----------- | --------------- | -------------------- |

      | 400 | INVALID_REQUEST | Požadavek nebyl správně naformátován (chybná
      syntaxe požadavku, příliš velká velikost atd.) |

      | 500 | FAILURE | Interní selhání |


      ### Výsledek MultiPrecheck


      Získání výsledku dokončené multipreskripční kontroly.


      V ostatních případech se zobrazí jedna z následujících chyb:


      | Stavový kód | Kód | Vysvětlení |

      | ----------- | --------------- | -------------------- |

      | 400 | INVALID_REQUEST | Požadavek nebyl správně naformátován (chybná
      syntaxe požadavku, příliš velká velikost atd.) |

      | 404 | APPLICATION_NOT_FOUND | Požadovaný prostředek nebyl nalezen |

      | 422 | NOT_SUPPORTED | Zdroj není pro daný typ financování podporován |

      | 422 | UNPROCESSABLE | Požadavek byl správně formulován, ale nebylo možné
      jej splnit kvůli sémantickým chybám |

      | 500 | INTERNAL_SERVER_ERROR | Nastal neočekávaný stav a není vhodná
      žádná konkrétnější zpráva |

      ### Notifikace o výsledku MultiPrecheck

      Zdroj oznámení, který musí být poskytnut partnerem, a je uvedeno uri

      během inicializace multi precheck. Oznámení neobsahuje výsledek

      zákazníků, pouze informaci, že výsledky jsou nyní k dispozici.
  - name: Installments calculator resources
    x-displayName: Zdroje splátkové kalkulačky
    description: >
      Když chcete poskytnout zákazníkovi (který chce zaplatit za nákup úvěrem)

      možnost vybrat si z dostupných splátkových programů, když je ještě na
      vašem

      webových stránkách, je třeba zavést "splátkovou kalkulačku".


      Pro integraci splátkové kalkulačky do svých webových stránek zvolte jeden
      z následujících přístupů:


      - A) Implementace vlastní splátkové kalkulačky s vaší FE ve vašem designu,
      která využívá určené zdroje API ([popsáno
      níže](#implementing-own-installments-calculator)).



      - B) Integrace javascriptového widgetu společnosti Home Credit (popsaného
      v [zvláštní kapitole](../Reference/java-script-widget-integration)), který:
        - poskytuje grafické uživatelské rozhraní a funkce front-endu
        - zpracovává všechny potřebné výpočty
        - poskytuje potřebné údaje back-endu e-shopu, aby je bylo možné snadno použít v rámci [požadavku na vytvoření *aplikace*](./create-using-post-3)

      > POZNÁMKA: Implementace splátkové kalkulačky je volitelná. Zákazníci
      mohou vždy používat splátkovou kalkulačku zabudovanou ve front-endu Home
      Creditu.



      ## Implementace vlastní splátkové kalkulačky


      K implementaci vlastní splátkové kalkulačky (s vlastním návrhem grafického
      uživatelského rozhraní) budete potřebovat následující zdroje:


      - `/financing/v1/installmentProgramsOffers` - pro zjištění dostupných
      nabídek splátkových programů a jejich podrobností


      - `/financing/v1/installmentPrograms` - pro zjištění podrobností vybraného
      splátkového programu


      - `/financing/v1/installmentProgramsDownPayments` - zjištění možností
      akontace v rámci dostupných nabídek splátkových programů


      ### Nabídky splátkových programů


      Když chce zákazník zaplatit nákup prostřednictvím úvěru a vy chcete

      mu zobrazit nabídku dostupných splátkových programů,

      použijte zdroj `/financing/v1/installmentProgramsOffers` se správně
      nastavenými nabídkami

      vyplněným požadavkem, který obsahuje alespoň následující údaje:


      - Kód produktové sady (správný kód produktové sady byste měli znát ze
      seznamu produktů)

      Obchodního zástupce Home Creditu nebo jiného podobného zdroje;

      pokud kód produktové sady neuvedete, bude použita vaše výchozí produktová
      sada)

      - Cena nákupu zákazníka


      Pokud byl požadavek úspěšně zpracován, obdržíte stavový kód HTTP 200

      a pole objektů dostupných splátkových programů s minimálně

      následujícími informacemi v odpovědi:


      - Splátkový program (pole)
        - Kód produktu splátkového programu
        - Typ splátkového programu (v případě nabídky pouze jednoho splátkového programu)
        v odpovědi je to typ `FAVOURITE`)
        - Výše splátky
        - Počet splátek

      V ostatních případech se zobrazí jedna z následujících chyb:


      | Stavový kód | Kód | Vysvětlení |

      | ----------- | --------------- | -------------------- |

      | 400 | INVALID_REQUEST | Požadavek nebyl správně naformátován (chybná
      syntaxe požadavku, příliš velká velikost atd.) |

      | 422 | UNPROCESSABLE | Požadavek byl dobře zformulován, ale nebylo možné
      jej následovat kvůli sémantickým chybám |

      | 500 | INTERNAL_SERVER_ERROR | Nastal neočekávaný stav a není vhodná
      žádná konkrétnější zpráva |


      Výpočet nabídky splátkových programů podle zadaného vstupu


      | funkce | podporováno zdrojem |

      | ------- | --------------------- |

      | stránkování | ne |

      | třídění | ne |

      | filtrování | ne |


      ### Splátkové programy


      Když chce zákazník zjistit podrobnosti o jednom z dříve nabízených

      splátkových programů, použijte zdroj `/financing/v1/installmentPrograms`

      s řádně vyplněným požadavkem, který obsahuje alespoň následující údaje:


      - Kód produktu daného splátkového programu

      - Cena nákupu zákazníka


      Pokud byl požadavek úspěšně zpracován, zobrazí se stav HTTP

      kód 200 a objekt s informacemi o zadané splátce

      programu s minimálně následujícími informacemi v odpovědi:


      - Typ splátkového programu

      - Výše splátky

      - Počet splátek

      - Podrobnosti o splátkovém programu


      V ostatních případech se zobrazí jedna z následujících chyb:


      | Stavový kód | Kód | Vysvětlení |

      | ----------- | --------------- | -------------------- |

      | 400 | INVALID_REQUEST | Požadavek nebyl správně naformátován (chybná
      syntaxe požadavku, příliš velká velikost atd.) |

      | 422 | UNPROCESSABLE | Požadavek byl dobře zformulován, ale nebylo možné
      jej následovat kvůli sémantickým chybám |

      | 500 | INTERNAL_SERVER_ERROR | Nastal neočekávaný stav a není vhodná
      žádná konkrétnější zpráva |


      Podrobné informace o programu pro výpočet splátek. Vrátí splátkový
      program, který nejvíce odpovídá zadanému vstupu.


      ### Splátkové programy akontace


      Když chce zákazník zaplatit nákup prostřednictvím úvěru a také

      chce zvolit vlastní nastavení akontace v rámci nabízených splátek

      programů, použijte zdroj `/financing/v1/installmentProgramsDownPayments`

      s řádně vyplněným požadavkem, který obsahuje alespoň následující údaje:


      - Kód produktové sady (správný kód produktové sady byste měli znát z
      dokumentu

      Obchodního zástupce Home Creditu nebo z jiného podobného zdroje)

      - Cena nákupu zákazníka


      Pokud byl požadavek úspěšně zpracován, obdržíte stavový kód HTTP

      200 a objekt informací o nastavení dostupných zálohových plateb

      s minimálně následujícími informacemi v odpovědi:


      - Minimální výše zálohy

      - Maximální výše zálohové platby

      - Krok mezi danou minimální a maximální výší zálohy


      V ostatních případech se zobrazí jedna z následujících chyb:


      | Stavový kód | Kód | Vysvětlení |

      | ----------- | --------------- | -------------------- |

      | 400 | INVALID_REQUEST | Požadavek nebyl správně naformátován (chybná
      syntaxe požadavku, příliš velká velikost atd.) |

      | 422 | UNPROCESSABLE | Požadavek byl dobře zformulován, ale nebylo možné
      jej následovat kvůli sémantickým chybám |

      | 500 | INTERNAL_SERVER_ERROR | Nastal neočekávaný stav a není vhodná
      žádná konkrétnější zpráva |


      Výpočet splátek splátkových programů podle zadaného vstupu
  - name: Merchantsite resources
    x-displayName: Zdroje pro partnery
    description: >
      Služby, které by měly být vyvinuty a vystaveny partnerskými e-shopy, aby
      umožnily

      HC asynchronně informovat tyto partnerské e-shopy o důležitých změnách

      týkající se konkrétních *aplikací* a *objednávek*


      > **UPOZORNĚNÍ:** Tato sada API NENÍ vystavena ze strany HC. Místo toho by
      ji měl vyvinout partner a přijímat níže specifikovaná volání.


      ## Oznámení o aplikaci

      Tento prostředek používáme v případě potřeby informovat o důležitých
      změnách v rámci konkrétní aplikace. Konkrétně v následujících situacích:


      | Spouštěč | Odpovídající Application.stateReason | Očekávaná reakce |

      | ------- | ------------------------------------- | ----------------- |

      | Žádost byla schválena (schvalovací proces probíhá správně) |
      PROCESSING_APPROVED | Nezrušit předčasně objednávku zákazníka |

      | Žádost byla zamítnuta | REJECTED | Pravděpodobně byste měli zrušit
      příslušnou objednávku a uvolnit rezervované zboží |

      | Žádost byla zrušena (před dodáním) | CANCELLED_NOT_PAID | Pravděpodobně
      byste měli zrušit příslušnou objednávku a uvolnit rezervované zboží |

      | Objednávka k odeslání (zavazujeme se financovat objednávku zákazníka) |
      READY_TO_SHIP | Odeslání objednávky zákazníkovi |

      | Žádost bude vyplacena | READY_PAID | Počkejte, až s vámi zpracujeme
      finanční vyrovnání |


      Do žádosti vyplníme minimálně následující informace:


      - Unikátní ID žádosti

      - Stav žádosti

      - Podstav žádosti

      - Zálohová platba

      - Časové razítko oznámení

      - Hashovaná zpráva (kontrolní součet)


      > UŽITEČNÁ POZNÁMKA: Pokud se vám zdá, že nám trvá neobvykle dlouho, než
      vám pošleme konkrétní oznámení, neváhejte použít zdroj
      `/financing/v1/applications/{applicationId}` (kde `{applicationId}` je ID
      aplikace, které jste obdrželi v odpovědi na `/financing/v1/applications`
      po jejím vytvoření) a přímo zjistit informace, které hledáte.
