      | 422 | NOT_SUPPORTED | Zdroj není pro daný typ financování podporován |

      | 422 | UNPROCESSABLE | Požadavek byl správně formulován, ale nebylo možné
      jej splnit kvůli sémantickým chybám |

      | 500 | INTERNAL_SERVER_ERROR | Nastal neočekávaný stav a není vhodná
      žádná konkrétnější zpráva |


      ### Označit objednávku jako doručenou


      Pokud byla celá objednávka doručena zákazníkovi, použijte
      `/financing/v1/applications/{applicationId}/order/deliver`

      kde `{applicationId}` je ID aplikace, které jste obdrželi v odpovědi
      `/financing/v1/applications` po jejím vytvoření.


      | Typ financování | Podporováno |

      | ----------- | --------------- |

      | `INSTALLMENT` | YES |


      | Stav žádosti | Dostupnost |

      | ----------- | --------------- |

      | `PROCESSING` | NE |

      | `ODMÍTNUTO` | NE |

      | `ZRUŠENO` | NE

      | `READY` | ANO* (viz poznámka k dostupnosti níže) |


      > POZNÁMKA K DOSTUPNOSTI: Požadavek je platný, když
      `Application.stateReason = READY_TO_SHIP`.

      Požadavek je platný také po přechodu `Aplikace` na `stavDůvod =
      READY_DELIVERED`

      nebo `stateReason = READY_PAID` (tj. opakované platné požadavky vracejí
      stavový kód HTTP 200 OK, pokud se v době přechodu na stavový kód

      `Application.stateReason = CANCELLED_RETURNED`)


      Pokud byl požadavek úspěšně zpracován, obdržíte stavový kód HTTP 200 a
      objekt

      informací o změněné objednávce a základní informace o příslušné aplikaci

      (ID, stav, podstav) s minimálně následujícími informacemi v odpovědi:


      - Číslo objednávky

      - Celková cena objednávky (včetně DPH)

      - Položky objednávky (pole)
        - Název položky objednávky
        - Celková cena (všechny kusy včetně DPH)
        - Stav položky objednávky
      - Stav objednávky

      - Základní informace o aplikaci
        - ID
        - Stav aplikace
        - Podstata aplikace

      V ostatních případech se zobrazí jedna z následujících chyb:


      | Stavový kód | Kód | Vysvětlení |

      | ----------- | --------------- | -------------------- |

      | 400 | INVALID_REQUEST | Požadavek nebyl správně naformátován (chybná
      syntaxe požadavku, příliš velká velikost atd.) |

      | 404 | OBJECT_NOT_FOUND | Požadovaný prostředek nebyl nalezen |

      | 422 | NOT_SUPPORTED | Zdroj není pro daný typ financování podporován |

      | 422 | UNPROCESSABLE | Požadavek byl správně formulován, ale nebylo možné
      jej splnit kvůli sémantickým chybám |

      | 500 | INTERNAL_SERVER_ERROR | Nastal neočekávaný stav a není vhodné
      zaslat konkrétnější zprávu |


      ### Objednávky


      Pokud potřebujete zjistit aktuální informace o konkrétní zakázce -
      především její stav

      a další podrobnosti - použijte zdroj
      `/financing/v1/orders{?applicationId}`, kde `{applicationId}` je
