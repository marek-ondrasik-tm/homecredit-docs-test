paths:
  /authentication/v1/partner:
    post:
      responses:
        "200":
          description: Vydán přístupový token partnera
          headers: {}
          content:
            application/json; charset=utf-8:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: Přístupový token
                  expiresIn:
                    type: number
                    description: Zbývající doba platnosti tokenu (v sekundách)
                  tokentype:
                    type: string
                    description: typ tokenu. Vždy "bearer".
                required:
                  - accessToken
                  - tokentype
              examples:
                response:
                  value:
                    accessToken: TokenForPartnerTokenForPartnerTokenForPartnerTokenForPartner
                    expiresIn: 7200
                    tokentype: bearer
        "400":
          description: Nepodařilo se ověřit partnera
          headers: {}
          content:
            application/json; charset=utf-8:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Jedinečný interní kód chyby
                        message:
                          type: string
                          description: Popis chyby čitelný pro člověka (nelokalizovaný)
                        severity:
                          type: string
                          enum:
                            - ERROR
                            - WARN
                            - INFO
                        attribute:
                          type: string
                          description: JSON cesta k atributu požadavku, který chybu způsobil (nepovinné)
                        ticketId:
                          type: string
                          description: Interní ID tiketu, používané pro zpětné sledování chyb
                      required:
                        - code
                        - message
                        - severity
                    description: Pole s chybami
                required:
                  - errors
              examples:
                response:
                  value:
                    errors:
                      - code: BAD_REQUEST
                        message: Bad request
                        severity: ERROR
                        attribute: customer.addresses[1].streetNumber
                        ticketId: UAT1:AMS:20160516-091658.450:45e4
      summary: Přihlášení partnera
      operationId: Login partner
      description: Partner se ověří a získá přístupový token.
      tags:
        - Security
      requestBody:
        content:
          application/json; charset=utf-8:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Uživatelské jméno partnera
                password:
                  type: string
                  description: Tajné heslo partnera
              required:
                - username
                - password
              example:
                username: eShop
                password: eShopSecretPassword
