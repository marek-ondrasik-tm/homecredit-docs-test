  /partner/notification/endpoint:
    post:
      responses:
        "204":
          description: No Content
          headers: {}
        "400":
          description: Bad Request
          headers: {}
      summary: Application notification
      operationId: Application notification
      description: Notify partner about changes in application.
      tags:
        - Merchantsite resources
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              type: object
              properties:
                notificationContent:
                  type: object
                  properties:
                    applicationId:
                      type: string
                      description: Primary identifier of the application
                    applicationStatus:
                      type: string
                      enum:
                        - CREATED
                        - PRESCORED
                        - APPROVED
                        - VERIFICATION
                        - ALTERNATIVE
                        - CONFIRMED
                        - REJECTED
                        - CANCELLED
                      description: Status of the application
                    orderNumber:
                      type: string
                      description: Order number (internal for e-shop)
                    orderStatus:
                      type: string
                      enum:
                        - IN_PROCESS
                        - TO_SHIP
                        - SHIPPED
                        - CHECKING_DELIVERY
                        - DELIVERED
                        - PAID
                        - CANCELLED
                        - TERMINATED
                      description: Status of the Order
                    downPayment:
                      type: object
                      properties:
                        value:
                          type: number
                          description: Amount in minor units (150000 represents 1 500) [ISO
                            4217](https://en.wikipedia.org/wiki/ISO_4217)
                        currency:
                          type: string
                          description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
                            Only local currency is allowed (CZK in Czech
                            Republic and EUR in Slovakia).
                      required:
                        - value
                        - currency
                      description: Current down payment set by a customer
                    notificationDate:
                      type: string
                      description: Time when notification was created (uses [ISO
                        8601](https://en.wikipedia.org/wiki/ISO_8601)
                        formatting)
                    sequenceNumber:
                      type: number
                      description: Notification sequence number
                  required:
                    - applicationId
                    - applicationStatus
                    - notificationDate
                    - sequenceNumber
                  description: Content of the notification
                sentDate:
                  type: string
                  description: Time when notification was sent (uses [ISO
                    8601](https://en.wikipedia.org/wiki/ISO_8601) formatting)
                checksum:
                  type: string
                  description: Message checksum - result of HMAC with SHA512 (secret key is used)
              required:
                - notificationContent
                - sentDate
                - checksum
              example:
                notificationContent:
                  applicationId: 123e4567-e89b-12d3-a456-426655440000
                  applicationStatus: CONFIRMED
                  orderNumber: AA234
                  orderStatus: TO_SHIP
                  downPayment:
                    value: 150000
                    currency: CZK
                  notificationDate: 2020-07-15T00:00:00+02:00
                  sequenceNumber: 1
                sentDate: 2020-07-15T00:00:00+02:00
                checksum: f61c69a259b702d564b2032e554984dec3b713ff7bdde17fcb727d403ea0d730816f46ad2bbc06a1914225d5dfba0396927dbf1b0698081814877b5486950a15
tags:
  - name: Security
    description: >-
      To access our API, partner has to obtain *access token* first; this token
      is a string of arbitrary length (30+ chars) and it has to be included in
      HTTP header to every request to API. This section describes way to obtain
      valid access token and use it to access protected resources.


      - to obtain access token, use `/authentication/v1/partner` resource with appropriate parameters (see the [`/authentication/v1/partner` resource documentation](./login-partner))


      - access token should be present in every request using request header `Authorization`, with type `Bearer`. If partner's access token has value `secret_token`, it should be specified as follows:


      `Authorization: Bearer secret_token`


      So the real example using curl will look like:


      ```

      curl -H "Authorization: Bearer secret_token" https://api.homecredit.cz/financing/v3/applications

      ```


      - access token has limited time validity (for 2 hours). After it is expired, partner has to obtain new one using `/authentication/v1/partner` resource.


      - if partner fails to specify access token, he will receive `401 Unauthorized` error and following response body:


      ```

      {
         "error_description": "The access token is missing",
         "error": "invalid_request"
      }

      ```


      - if partner provides invalid access token, he will receive `401 Unauthorized` error and following response body:


      ```

      {
          "error_description":"The access token is invalid or has expired",
          "error":"invalid_token"
      }

      ```


      > IMPORTANT NOTE: Partner must keep his access token and login credentials safe. Login credentials nor access token should NEVER be put into client page. If partner plans to integrate API calls in customer flow without submitting the page to server, partner should implement REST endpoint bound to partner's shopping basket session, that will be used as a proxy to call HC API.


      > NEVER transfer access token nor login credentials over plain HTTP. Such requests will be refused.
  - name: Application resources
    description: Services that allow the processing of *application* during its
      whole lifecycle.
  - name: Health check
    description: >-
      To easily find out current API state use the [API state check
      resource](./api-status-check).

      To check the availability of back-end services use the [health check resource](./api-health-check).
  - name: Scoring resources
    description: Services that allow partner e-shops to find out a probability of
      *application's* approval.
  - name: Installments calculator resources
    description: >-
      When you want to provide your customer (that wants to pay for a purchase
      by a loan) an option to choose from available installment programs while
      he is still on your website, it is necessary to implement "installments
      calculator".


      Choose one of the following approaches to integrate installments calculator into your website:


      - A) Implementing your own installment calculator, with your FE in your design that uses designated API resources ([described below](#implementing-own-installments-calculator)).


      - B) Integrating Home Credit's javascript widget (described in [special chapter](./java-script-widget-integration)) that:
        - provides GUI and front-end functionalities
        - process all needed calculations
        - provides necessary data to e-shop's back-end in order to easily use them within [*application* creation request](./create-application)

      > NOTE: Implementation of installment calculator is optional. Customers can always use the installment calculator embedded in Home Credit's front-end.


      ## Implementing own installments calculator


      In order to implement your own installment calculator (with your GUI design) you will need following resources:


      - `/financing/v3/installmentProgramsOffers` - to find out available installment programs offers and their details


      - `/financing/v3/installmentPrograms` - to find out details of a chosen installment program


      - `/financing/v3/installmentProgramsDownPayments` - to find out down payment options within available installment programs offers
  - name: JavaScript widget integration
    description: In order to use Home Credit's javascript widget as an installment
      calculator, your e-shop back-end has to be configured properly. How to do
      it is currently described in [our on-line
      repository](https://github.com/homecreditcz/widget-calculator) (currently
      written in Czech).
  - name: Merchantsite resources
    description: >-
      Services that should be developed and exposed by partner e-shops to allow
      HC asynchronously inform these partner e-shops about important changes
      regarding particular *applications* and *orders*


      > **ATTENTION:** This set of APIs is NOT exposed from HC. Instead, it should be developed by partner and accept calls specified below.
servers:
  - url: https://api.homecredit.cz
components:
  schemas:
    Precheck: {}
    MultiPrecheck: {}
    ApplicationRequest:
      type: object
      required:
        - customer
        - originationContext
        - financedSubject
      properties:
        customer:
          $ref: "#/components/schemas/FinancingApplicationCustomer"
        originationContext:
          $ref: "#/components/schemas/FinancingOriginationContext"
        financedSubject:
          $ref: "#/components/schemas/FinancedSubjectBase"
    FinancingApplicationCustomerBase:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - PERSON
            - ENTREPRENEUR
            - LEGAL_ENTITY
          description: Customer type
    FinancingApplicationCustomer:
      allOf:
        - $ref: "#/components/schemas/FinancingApplicationCustomerBase"
        - type: object
          properties:
            person:
              $ref: "#/components/schemas/FinancingPerson"
            entrepreneur:
              $ref: "#/components/schemas/Company"
            legalEntity:
              $ref: "#/components/schemas/Company"
    FinancingPerson:
      type: object
      properties:
        firstName:
          type: string
          example: John
          description: Customer first (given) name. Name SHOULD follow regular expression
            `^[A-ZÁ-Ž]'?[- \u00A0a-zA-Zá-žÁ-Ž]*[a-zA-Zá-žÁ-Ž]$`, SHOULD be 2 to
            30 characters long and characters SHOULD be in the `ISO 8859-2`
            character set.
        lastName:
          type: string
          example: Newborn
          description: Customer last (family) name. Name SHOULD follow regular expression
            `^[A-ZÁ-Ž]'?[- \u00A0a-zA-Zá-žÁ-Ž]*[a-zA-Zá-žÁ-Ž]$`,SHOULD be 2 to
            30 characters long and characters SHOULD be in the `ISO 8859-2`
            character set.
        fullName:
          type: string
          example: Ing. John Newborn, Csc.
          description: Customer full name, including academical degrees and salutation.
            Attribute `fullName` is parsed (and eventually shortened) into
            `firstName` and `lastName`; `fullName` is never returned in
            response. In case all three attributes are provided, `fullName` is
            discarded. Full name SHOULD be no longer than 100 characters and
            characters SHOULD be in the `ISO 8859-2` character set
        contacts:
          type: array
          items: {}
          description: Contacts of person.
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/Address"
          description: Addresses.
        identificationNumber:
          type: string
          example: 890619/5723
          description: Customer's identification number (actually birth number). SHOULD be
            valid according to the legislation currently in effect. Customer
            MUST be at least 18 years old.
        ipAddress:
          type: string
          example: 172.10.10.1
          description: IPv4 or IPv6 address of a customer.
        fingerprintComponents:
          $ref: "#/components/schemas/KeyValue"
    Address:
      type: object
      properties:
        city:
          type: string
          example: Prague
          description: City. String values longer than 100 characters will be shortened to
            100 characters.
        streetAddress:
          type: string
          example: Letenská
          description: Street/city part. String values longer than 100 characters will be
            shortened to 100 characters.
        streetNumber:
          type: string
          example: "22"
          description: Street number. String values longer than 50 characters will be
            shortened to 50 characters.
        zip:
          type: string
          example: 140 00
          description: Postal code. String values longer than 10 characters will be
            shortened to 10 characters.
        flags:
          type: array
          items:
            $ref: "#/components/schemas/AddressFlag"
          description: Types of the address.
    AddressFlag:
      type: string
      enum:
        - PERMANENT
        - CONTACT
    ApplicationContact:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - EMAIL
            - MOBILE
            - PHONE
          description: Contact type
        email:
          $ref: "#/components/schemas/Email"
        mobile:
          $ref: "#/components/schemas/Phone"
        phone:
          $ref: "#/components/schemas/Phone"
    Email:
      type: object
      required:
        - value
      properties:
        value:
          type: string
          example: john.newborn@country.com
          description: E-mail address of customer. MUST be valid email according to [RFC
            2822](https://tools.ietf.org/html/rfc2822).
    Phone:
      type: object
      required:
        - value
      properties:
        countryCode:
          type: string
          example: "+420"
          description: MUST be valid countryCode.
        value:
          type: string
          example: "777123456"
          description: Mobile phone number SHOULD be 9 characters long. The mobile phone
            number itself without country code SHOULD begin with digit `6` or
            `7` (for CZ) or with `9x` where `x` is different from `6` (for SK).
    Company:
      type: object
      properties:
        businessName:
          type: string
          example: Planeta s.r.o.
          description: Name of business company.
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/Address"
          description: Addresses.
        businessIdentificationNumber:
          type: string
          example: "123456854"
          description: Company's identification number (known as IČO).
        ipAddress:
          type: string
          example: 172.10.10.1
          description: IPv4 or IPv6 address of a customer.
        fingerprintComponents:
          $ref: "#/components/schemas/KeyValue"
    FinancedSubjectBase:
      type: object
      required:
        - type
        - order
      properties:
        type:
          type: string
          enum:
            - ORDER
          description: Financed subject type
        order:
          $ref: "#/components/schemas/OrderBase"
    OrderBase:
      type: object
      required:
        - type
        - totalPrice
        - financings
      properties:
        type:
          type: string
          enum:
            - STANDARD
            - BROKERED
          description: Type of order.
        number:
          type: string
          example: "11111111"
          description: Identifier, specified by the partner (e-shop, POS shop,
            inetmediary). MAY be provided for easier identification of
            application on partner's side. MUST NOT be longer than 100
            characters.
        specificSymbol:
          type: string
          example: "1122334455"
          description: Specific symbol (internal for partner) for reconciliation payment.
            MUST NOT be longer than 10 characters
        variableSymbol:
          type: string
          example: "1234567"
          description: Variable symbol (internal for e-shop) for reconciliation payment.
            MUST NOT be longer than 10 characters. If empty, `order.number` is
            used instead. If not provided or not usable (e.g. `order.number`
            contains only letters) Home Credit internal identifier is used.
        totalPrice:
          $ref: "#/components/schemas/Amount"
        preferredDownPayment:
          $ref: "#/components/schemas/Amount"
        financings:
          type: array
          items:
            $ref: "#/components/schemas/OrderFinancing"
          description: Information about form of financing ORDER application. MUST be
            provided with at least `type` of `financing` for orders with only
            single financing. MUST be provided with at least `amount` and `type`
            for particular `financing` parts for orders with multiple financings
            (typically more complicated product, for example Iphone purchase
            with future buyback).
        standard:
          $ref: "#/components/schemas/StandardOrder"
        brokered:
          $ref: "#/components/schemas/BrokeredOrder"
    StandardOrder:
      type: object
      required:
        - items
      properties:
        deliveryType:
          type: string
          enum:
            - PERSONAL_BRANCH
            - PERSONAL_PARTNER
            - ONLINE
            - DELIVERY_CARRIER
          description: Type of service used for goods delivery
        reservationDate:
          type: string
          example: 2017-07-15T00:00:00+02:00
          description: Date and time until order is reserved. Until `reservationDate` HCO
            will try to notify partner with Application notification about
            approval or rejection.After this date and time, e-shop does not
            guarantee items availability (if application processing is longer,
            it may endanger order fullfillment).
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
          description: Order items, MUST contain at least one item
    BrokeredOrder:
      type: object
      required:
        - merchantOrders
      properties:
        merchantOrders:
          type: array
          items:
            $ref: "#/components/schemas/MerchantOrder"
          description: Array of merchant orders (usually consists of one order)
    MerchantOrder:
      type: object
      required:
        - name
      properties:
        number:
          type: string
          example: "22222222"
          description: Internal order number of the merchant (e-shop, POS shop), MAY be
            provided for easier identification of application on partner's side,
            MUST NOT be longer than 100 characters.
        name:
          type: string
          example: MALL
          description: Merchant name, MUST NOT be longer than 60 characters
        logo:
          $ref: "#/components/schemas/File"
        businessIdentificationNumber:
          type: number
          example: 26204967
          description: Business identification number, MUST NOT be longer than 8 digits
        url:
          type: string
          example: www.mall.cz
          description: "`URL of the merchant's`web site (e-shop), MUST NOT be longer than
            1000 characte`s, MUST be valid URL"
        deliveryType:
          type: string
          enum:
            - PERSONAL_BRANCH
            - PERSONAL_PARTNER
            - ONLINE
            - DELIVERY_CARRIER
          description: Type of service used for goods delivery
        reservationDate:
          type: string
          example: 2017-07-15T00:00:00+02:00
          description: Date and time until order is reserved. Until `reservationDate` HCO
            will try to notify partner with Application notification about
            approval or rejection.After this date and time, e-shop does not
            guarantee items availability (if application processing is longer,
            it may endanger order fullfillment).
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
          description: Order items
    OrderItem:
      type: object
      required:
        - name
        - totalPrice
      properties:
        code:
          type: string
          example: EXC4677-1a
          description: Internal code for item (internal to e-shop). Used to better
            identify the item for future changes. Maximum 100 characters
        ean:
          type: string
          example: "888462064002"
          description: EAN code. Maximum 32 characters
        name:
          type: string
          example: iPhone 6s 32GB SpaceGray
          description: Item name. String values longer than 60 characters will be
            shortened to 60 characters.
        quantity:
          type: number
          example: 1
          description: Item quantity. If empty, considered as 1.
        type:
          type: string
          enum:
            - PHYSICAL
            - DISCOUNT
            - SHIPPING_FEE
            - SALES_TAX
            - DIGITAL
            - GIFT_CARD
            - STORE_CREDIT
            - FEE
            - INSURANCE
          description: Item type
        totalPrice:
          $ref: "#/components/schemas/Amount"
        unitPrice:
          $ref: "#/components/schemas/Amount"
        producer:
          type: string
          example: "'Apple'"
          description: MUST NOT be longer than 50 characters.
        image:
          $ref: "#/components/schemas/File"
    OrderFinancing:
      type: object
      required:
        - type
        - installment
      properties:
        type:
          type: string
          enum:
            - INSTALLMENT
          description: Financing type
        amount:
          $ref: "#/components/schemas/Amount"
        installment:
          $ref: "#/components/schemas/SettingsInstalment"
    SettingsInstalment:
      type: object
      properties:
        preferredMonths:
          type: number
          example: 6
          description: Preferred number of installments (in months)
        preferredInstallment:
          $ref: "#/components/schemas/Amount"
        productCode:
          type: string
          example: "'COCONL06'"
          description: Product code (obtained from calculation result).
        flags:
          type: array
          items:
            anyOf:
              - null
              - type: string
                enum:
                  - BUYBACK
          description: Type of installment program. Used typically with multiple financings.
    FinancingOriginationContext:
      type: object
      required:
        - channel
      properties:
        channel:
          $ref: "#/components/schemas/OriginationChannel"
        precheckIds:
          type: array
          items:
            type: string
          description: Array of all precheck ids related to this application. If partner
            has run Precheck operation with this Customer's data he SHOULD
            provide precheckId into this attribute. SHOULD be valid precheckId.
            See Precheck operations and their's response.
        sourceId:
          type: string
          example: Cash_10_2020
          description: Identifier of source or campaign of lead origin. Partner SHOULD
            provide valid `sourceId`
        extendedData:
          type: array
          items:
            $ref: "#/components/schemas/KeyValue"
          description: "Additional data about application origin. List of supported `keys`
            for `extendedData`: `utm_source`, `utm_medium`, `utm_campaign`,
            `utm_term`, `utm_content`, `gclid`, `fbclid`, `url`."
    OriginationChannel:
      type: object
      required:
        - type
        - online
      properties:
        type:
          type: string
          enum:
            - ONLINE
          description: Type of origination channel
        online:
          $ref: "#/components/schemas/MerchantURLs"
    MerchantURLs:
      type: object
      properties:
        approvedRedirect:
          type: string
          example: https://www.partnereshop.cz
          description: URL of the partner used for redirection of the customer back to
            partner website after the application approval. MUST be a valid URL
            according to [RFC 3986](https://tools.ietf.org/html/rfc3986). URL
            SHOULD contain scheme (for example `https://`) otherwise some
            browsers will not redirect customer correctly.  MUST NOT be longer
            than 1000 characters.
        rejectedRedirect:
          type: string
          example: https://www.partnereshop.cz/kosik
          description: URL of the partner used for redirection of the customer back to
            partner website after application rejection. MUST be valid URL
            according to [RFC 3986](https://tools.ietf.org/html/rfc3986). URL
            SHOULD contain scheme (for example `https://`) otherwise some
            browsers will not redirect customer correctly. MUST NOT be longer
            than 1000 characters.
        notificationEndpoint:
          type: string
          example: https://www.partnereshop.cz/order/AA234
          description: URL of the partner used as a notification endpoint for notifying
            partner about important updates in the application process
            (approval, rejection, cancellation, etc.). MUST be valid URL
            according to [RFC 3986](https://tools.ietf.org/html/rfc3986). URL
            SHOULD contain scheme (for example `https://`). MUST NOT be longer
            than 1000 characters.
    ApplicationBase:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          example: 123e4567-e89b-12d3-a456-426655440000
          description: Primary identifier of the application
        status:
          type: string
          enum:
            - CREATED
            - PRESCORED
            - ALTERNATIVE
            - VERIFICATION
            - APPROVED
            - CONFIRMED
            - REJECTED
            - CANCELLED
          description: Application status
        workflowSteps:
          type: array
          items:
            $ref: "#/components/schemas/FinancingWorkflowStep"
          description: Collection of currently available application process actions.
    FinancingWorkflowStep:
      type: object
      required:
        - code
        - priority
        - mandatory
      properties:
        code:
          type: string
          enum:
            - REDIRECT
            - DELIVERY
            - CANCELLATION
          description: Workflow code
        priority:
          type: number
          example: 1
          description: Identifier of workflow step's priority expressed as number (lowest
            number means highest priority)
        mandatory:
          type: boolean
          example: true
          description: Available workflow step for current application in application
            process.
        redirect:
          $ref: "#/components/schemas/RedirectURL"
    RedirectURL:
      type: object
      required:
        - gatewayRedirectUrl
      properties:
        gatewayRedirectUrl:
          type: string
          example: https://nasplatky.homecredit.cz
          description: Gateway redirect URL. Partner SHOULD redirect customer to this
            address for continuation of application approval process.
    InstallmentProgramProductSet:
      type: object
      required:
        - productSet
      properties:
        productSet:
          type: string
          example: COCHCONL
          description: Product set
    CancelApplicationRequest:
      type: object
      properties:
        reason:
          type: string
          enum:
            - APPLICATION_CANCELLED_CARRIER_CHANGED
            - APPLICATION_CANCELLED_CART_CONTENT_CHANGED
            - APPLICATION_CANCELLED_BY_CUSTOMER
            - APPLICATION_CANCELLED_BY_ERP
            - APPLICATION_CANCELLED_EXPIRED
            - APPLICATION_CANCELLED_UNFINISHED
            - APPLICATION_CANCELLED_BY_ESHOP_RULES
            - APPLICATION_CANCELLED_OTHER
          description: Reason of cancellation. Considered as   APPLICATION_CANCELLED_OTHER
            if not set.
        customReason:
          type: string
          description: Specification of APPLICATION_CANCELLED_OTHER reason
    GetApplicationDetail:
      allOf:
        - $ref: "#/components/schemas/ApplicationBase"
        - type: object
          required:
            - financedSubject
          properties:
            financedSubject:
              $ref: "#/components/schemas/GetFinancedSubject"
    GetFinancedSubject:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - ORDER
          description: Financed subject type
        order:
          $ref: "#/components/schemas/GetOrder"
    GetOrder:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - IN_PROCESS
            - TO_SHIP
            - SHIPPED
            - CHECKING_DELIVERY
            - DELIVERED
            - PAID
            - CANCELLED
            - TERMINATED
          description: Status of the Order
    NotificationRequest:
      type: object
      required:
        - notificationContent
        - sentDate
        - checksum
      properties:
        notificationContent:
          $ref: "#/components/schemas/NotificationContent"
        sentDate:
          type: string
          example: 2020-07-15T00:00:00+02:00
          description: Time when notification was sent (uses [ISO
            8601](https://en.wikipedia.org/wiki/ISO_8601) formatting)
        checksum:
          type: string
          example: f61c69a259b702d564b2032e554984dec3b713ff7bdde17fcb727d403ea0d730816f46ad2bbc06a1914225d5dfba0396927dbf1b0698081814877b5486950a15
          description: Message checksum - result of HMAC with SHA512 (secret key is used)
    NotificationContent:
      type: object
      required:
        - applicationId
        - applicationStatus
        - notificationDate
        - sequenceNumber
      properties:
        applicationId:
          type: string
          example: 123e4567-e89b-12d3-a456-426655440000
          description: Primary identifier of the application
        applicationStatus:
          type: string
          enum:
            - CREATED
            - PRESCORED
            - ALTERNATIVE
            - VERIFICATION
            - APPROVED
            - CONFIRMED
            - REJECTED
            - CANCELLED
          description: Status of the application
        orderNumber:
          type: string
          example: AA234
          description: Order number (internal for e-shop)
        orderStatus:
          type: string
          enum:
            - IN_PROCESS
            - TO_SHIP
            - SHIPPED
            - CHECKING_DELIVERY
            - DELIVERED
            - "`PAID` Order has been paid to partner"
            - CANCELLED
            - TERMINATED
          description: Status of the Order
        downPayment:
          $ref: "#/components/schemas/Amount"
        notificationDate:
          type: string
          example: 2020-07-15T00:00:00+02:00
          description: Time when notification was created (uses [ISO
            8601](https://en.wikipedia.org/wiki/ISO_8601) formatting)
        sequenceNumber:
          type: number
          example: 1
          description: Notification sequence number
    Error:
      type: object
      required:
        - code
        - message
        - severity
      properties:
        code:
          type: string
          example: BAD_REQUEST
          description: Unique internal error code
        message:
          type: string
          example: Bad request
          description: Human readable error description (non-localized)
        severity:
          type: string
          enum:
            - ERROR
            - WARN
            - INFO
        attribute:
          type: string
          example: customer.addresses[1].streetNumber
          description: JSON path of request attribute that caused the error (if applicable)
        ticketId:
          type: string
          example: UAT1:AMS:20160516-091658.450:45e4
          description: Internal ticket ID, used for error backtracking
    Errors:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
          description: Array with errors
    OTPErrors:
      allOf:
        - $ref: "#/components/schemas/Errors"
        - type: object
          properties:
            blockedUntil:
              type: string
              example: 2017-01-18T10:34:44+01:00
              description: requested operation is blocked until specified time
    PagingInfo:
      type: object
      required:
        - itemsPerPage
      properties:
        itemsPerPage:
          type: number
          example: 10
          description: number of items per page
        nextPage:
          type: string
          example: transactions?sort=category&limit=10&after=30
          description: request to retrieve next page, if it exists and can be
            unambiguously specified
        prevPage:
          type: string
          example: transactions?sort=category&limit=10&before=21
          description: request to retrieve previous page, if it exists and can be
            unambiguously specified
    Amount:
      type: object
      required:
        - value
        - currency
      properties:
        value:
          type: number
          example: 13300
          description: Amount in minor units (13300 represents 133) [ISO
            4217](https://en.wikipedia.org/wiki/ISO_4217)
        currency:
          type: string
          example: CZK
          description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
            Only local currency is allowed (CZK in Czech Republic and EUR in
            Slovakia).
    VatAmount:
      type: object
      properties: {}
    ScoringData:
      type: object
      required:
        - customer
      properties:
        customer:
          $ref: "#/components/schemas/PrecheckCustomer"
    PrecheckCustomer:
      type: object
      required:
        - firstName
        - lastName
        - email
        - phone
        - externalId
      properties:
        firstName:
          type: string
          example: John
          description: Customer first (given) name. String values longer than 100
            characters will be shortened to 100 characters.
        lastName:
          type: string
          example: Newborn
          description: Customer last (family) name. String values longer than 100
            characters will be shortened to 100 characters.
        email:
          type: string
          example: john.newborn@country.com
          description: E-mail address of customer. MUST be valid email according to [RFC
            2822](https://tools.ietf.org/html/rfc2822).
        phone:
          type: string
          example: "+420777123456"
          description: Mobile phone number with country code (including leading `+`).
        externalId:
          type: string
          example: "1576849"
          description: Unique customer's identifier in partner's system. Typically used
            for linking request and response together.
    PrecheckResult:
      type: object
      required:
        - id
        - recommendation
        - id
        - customer
        - potentialCreditAmount
      properties:
        id:
          type: string
          example: "1234"
          description: Unique identificator of Precheck. Send this identificator in
            ApplicationRequest to improve approval rate.
        recommendation:
          type: boolean
          description: |-
            A recommendation of whether the order should be passed to the HCO.

                true = Application is likely going to be approved.
            false = Application is likely going to be rejected.
        message:
          type: string
          example: V HCO peněžence nemáte dostatečný limit.
          description: Custom message for customer.
        customer:
          $ref: "#/components/schemas/PrecheckCustomer"
        potentialCreditAmount:
          $ref: "#/components/schemas/AmountOld"
    MultiPrecheckRequest:
      type: object
      required:
        - scoringData
      properties:
        scoringData:
          type: array
          items:
            $ref: "#/components/schemas/ScoringData"
        notificationEndpoint:
          type: string
          example: https://www.youreshop.cz/multiPrecheck/results
          description: URL of the partner used as a notification endpoint for providing
            information about result of multi precheck. Must be valid URL
            according to [RFC 3986](https://tools.ietf.org/html/rfc3986).
            Maximum 1000 characters.
    MultiPrecheckResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: Unique identifier of multi precheck's batch.
    BatchNotification:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          description: Unique identifier of multi precheck's batch.
        status:
          type: string
          enum:
            - SUCCESS
            - PARTIAL_SUCCESS
            - FAILURE
          description: Result of the precheck's batch.
    MultiPrecheckResult:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          description: Unique identifier of multi precheck's batch.
        status:
          type: string
          enum:
            - SUCCESS
            - PARTIAL_SUCCESS
            - FAILURE
            - PROCESSING
          description: Result of the precheck's batch.
        data:
          type: array
          items:
            $ref: "#/components/schemas/PrecheckResult"
          description: REQUIRED if precheck ended with `SUCCESS` or `PARTIAL_SUCCESS`
    InstallmentPrograms:
      type: object
      required:
        - installmentPrograms
      properties:
        installmentPrograms:
          type: array
          items:
            $ref: "#/components/schemas/InstallmentProgram"
          description: Array with installment programs offer
    InstallmentProgram:
      type: object
      required:
        - productCode
      properties:
        productCode:
          type: string
          example: COCONL06
          description: Installment program product code
        type:
          type: string
          enum:
            - MINIMAL
            - FAVOURITE
            - OTHER
          description: DEPRECATED. Do not use this attribute, use attribute `flags`
            instead. Attribute `type` remains in the API for backward
            compatibility
        flags:
          type: array
          items: {}
          description: Installment program flag. Multiple flags for one program are allowed.
        installment:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  example: 221900
                  description: Amount in minor units (250000 represents 2500 CZK/EUR) [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: monthly installment amount
        numberOfInstallments:
          type: number
          example: 6
          description: installment count
    InstallmentProgramDetail:
      allOf:
        - $ref: "#/components/schemas/InstallmentProgram"
        - type: object
          properties:
            detail:
              $ref: "#/components/schemas/CalculationDetail"
    InstallmentProgramFlag:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - MINIMAL
            - FAVOURITE
            - DELAY_FIRST_INSTALLMENT
            - BENEFIT
            - OTHER
          description: Flag type
        delayFirstInstallment:
          type: number
          example: 2
          description: The number of months for which the installment will be postponed.
            Required for `DELAY_FIRST_INSTALLMENT` flag.
        benefit:
          type: string
          example: TURBO
          description: Type of benefit. Required for `BENEFIT` flag.
    CalculationDetail:
      type: object
      properties:
        installmentDay:
          type: number
          example: 20
          description: Installment date (day in month)
        installmentFirstDate:
          type: string
          example: 2018-09-20
          description: Date of the first installment
        installmentLastDate:
          type: string
          example: 2019-02-20
          description: Date of the last installment
        annualInterestRate:
          type: number
          example: 0.1743
          description: Annual interest rate
        predictedProvisionDate:
          type: string
          example: 2018-08-10
          description: Predicted provision date
        paidBack:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  example: 1331400
                  description: Amount in minor units (250000 represents 2500 CZK/EUR) [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: Total amount paid by customer
        rpsn:
          type: number
          example: 0.19
          description: RPSN
        legalline:
          type: string
          example: '"Každou žádost posuzujeme individuálně a uvedené hodnoty jsme vám
            spočítali na míru.\nPlatí pro čerpání k 10.08.2018, datum první
            splátky je k 20.09.2018 a datum dalších splátek vždy k 20. dni v
            měsíci, počínaje 20.10.2018 a při lhůtě splatnosti 20.02.2019."'
          description: Text interpretation of the offer
    InstallmentProgramsDownPayments:
      type: object
      properties:
        minimum:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  description: Amount in minor units [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: The lowest down payment amount, e.g. 0 (0 CZK/EUR)
        maximum:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  example: 250000
                  description: Amount in minor units (250000 represents 2500 CZK/EUR) [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: Maximum down payment amount, e.g. 2500 (2 500 CZK/EUR)
        step:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  example: 50000
                  description: Amount in minor units (50000 represents 500 CZK/EUR) [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: "Size of one step between the lowest and maximum down payment
            amounts, e.g. 500 (500 CZK/EUR). Available down payments could be
            (min 0, max 2500): 0, 500, 1000, 1500, 2000, 2500"
    InstallmentProgramsRequest:
      type: object
      required:
        - productCode
        - price
      properties:
        productCode:
          type: string
          example: COCONL06
          description: Product code, this indicates previous calculation result
        price:
          $ref: "#/components/schemas/AmountOld"
        downPayment:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  description: Amount in minor units [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: Down payment amount (default is 0, amount should be rounded to
            hundreds)
    InstallmentProgramsOffersRequest:
      type: object
      required:
        - price
      properties:
        productSetCode:
          type: string
          example: COCHCONL
          description: Product set code, this will limit further calculations. If not
            provided, default productSet will be used.
        price:
          $ref: "#/components/schemas/AmountOld"
        downPayment:
          allOf:
            - $ref: "#/components/schemas/AmountOld"
            - type: object
              required:
                - amount
              properties:
                amount:
                  type: number
                  description: Amount in minor units [ISO
                    4217](https://en.wikipedia.org/wiki/ISO_4217)
          description: Down payment amount (default is 0, amount should be rounded to
            hundreds)
    InstallmentProgramsDownPaymentsRequest:
      type: object
      required:
        - productSetCode
        - price
      properties:
        productSetCode:
          type: string
          example: COCHCONL
          description: Product set code, this will limit further calculations
        price:
          $ref: "#/components/schemas/AmountOld"
    ApiInfo:
      type: object
      required:
        - value
        - currency
        - vatRate
      properties:
        value:
          type: number
          example: 14950
          description: Amount in minor units (14950 represents 149,50) [ISO
            4217](https://en.wikipedia.org/wiki/ISO_4217). MUST be 0 or greater.
        currency:
          type: string
          example: CZK
          description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
            Only local currency is allowed (CZK in Czech Republic and EUR in
            Slovakia).
        vatRate:
          type: number
          example: 15
          description: VAT rate as natural number (15 represents 15% rate)
    File:
      type: object
      required:
        - filename
      properties:
        filename:
          type: string
          example: iphone6s.jpg
          description: File name.
    AmountOld:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: number
          example: 133000
          description: Amount in minor units (133000 represents 1330) [ISO
            4217](https://en.wikipedia.org/wiki/ISO_4217)
        currency:
          type: string
          example: CZK
          description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
            Only local currency is allowed (CZK in Czech Republic and EUR in
            Slovakia).
    VatAmountOld:
      type: object
      properties: {}
    EmptyRE:
      type: object
      properties: {}
    KeyValue:
      type: object
      required:
        - key
        - value
      properties:
        key:
          type: string
          example: property
          description: Key
        value:
          type: string
          example: value
          description: Value
    BankAccount:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - IBAN
            - NATIONAL
          description: Account type
    AccountIBAN:
      type: object
      required:
        - iban
      properties:
        iban:
          type: string
          example: CZ6508000000192000145399
          description: Account number in IBAN format
    AccountNational:
      type: object
      required:
        - accountNumber
        - bankCode
      properties:
        prefix:
          type: string
          example: "000000"
          description: Account number prefix. For domestic accounts, this will be
            specified in national format.
        accountNumber:
          type: string
          example: "1235335010"
          description: Account number. For domestic accounts, this will be specified in
            national format.
        bankCode:
          type: string
          example: "3030"
          description: For domestic accounts, bank code in national format
    PartnerLogin:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: eShop
          description: Partner username
        password:
          type: string
          example: eShopSecretPassword
          description: Partner secret password
    PartnerLoginResult:
      type: object
      required:
        - accessToken
        - tokentype
      properties:
        accessToken:
          type: string
          example: TokenForPartnerTokenForPartnerTokenForPartnerTokenForPartner
          description: Access token
        expiresIn:
          type: number
          example: 7200
          description: Token validity remaining time (in seconds)
