  "/financing/v3/applications/{applicationId}/orders/ship":
    put:
      responses:
        "204":
          description: No Content
          headers: {}
        "422":
          description: Status change can not be processed
          headers: {}
          content:
            application/json;charset=UTF-8:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Unique internal error code
                        message:
                          type: string
                          description: Human readable error description (non-localized)
                        severity:
                          type: string
                          enum:
                            - ERROR
                            - WARN
                            - INFO
                        attribute:
                          type: string
                          description: JSON path of request attribute that caused the error (if
                            applicable)
                        ticketId:
                          type: string
                          description: Internal ticket ID, used for error backtracking
                      required:
                        - code
                        - message
                        - severity
                    description: Array with errors
                required:
                  - errors
              examples:
                response:
                  value:
                    errors:
                      - code: BAD_REQUEST
                        message: Bad request
                        severity: ERROR
                        attribute: customer.addresses[1].streetNumber
                        ticketId: UAT1:AMS:20160516-091658.450:45e4
      summary: Mark order as shipped
      operationId: Mark order as shipped
      description: When the whole *order* was shipped to the customer, partner use
