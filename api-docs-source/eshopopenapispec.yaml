servers:
  - url: https://api.homecredit.cz
tags:
  - name: Security
    description: >-
      To access our API, partner has to obtain *access token* first; this token
      is a string of arbitrary length (30+ chars) and it has to be included in
      HTTP header to every request to API. This section describes way to obtain
      valid access token and use it to access protected resources.


      - to obtain access token, use `/authentication/v1/partner` resource with appropriate parameters (see the [`/authentication/v1/partner` resource documentation](./login-partner))


      - access token should be present in every request using request header `Authorization`, with type `Bearer`. If partner's access token has value `secret_token`, it should be specified as follows:


      `Authorization: Bearer secret_token`


      So the real example using curl will look like:


      ```

      curl -H "Authorization: Bearer secret_token" https://api.homecredit.cz/financing/v1/applications

      ```


      - access token has limited time validity (for 2 hours). After it is expired, partner has to obtain new one using `/authentication/v1/partner` resource.


      - if partner fails to specify access token, he will receive `401 Unauthorized` error and following response body:


      ```

      {
         "error_description": "The access token is missing",
         "error": "invalid_request"
      }

      ```


      - if partner provides invalid access token, he will receive `401 Unauthorized` error and following response body:


      ```

      {
          "error_description":"The access token is invalid or has expired",
          "error":"invalid_token"
      }

      ```


      > IMPORTANT NOTE: Partner must keep his access token and login credentials safe. Login credentials nor access token should NEVER be put into client page. If partner plans to integrate API calls in customer flow without submitting the page to server, partner should implement REST endpoint bound to partner's shopping basket session, that will be used as a proxy to call HC API.


      > NEVER transfer access token nor login credentials over plain HTTP. Such requests will be refused.
  - name: Application resources
    description: |
      Services that allow the processing of *application* during and
      **order** during their whole lifecycle.

      ### Create application

      Elementary flow starts when customer wants to use one of Home Credit's payment method for financing his purchase made in partner e-shop.

      | Financing type | Supported            |
      | ----------- | --------------- |
      | `INSTALLMENT`         | YES  |

      Use `/financing/v1/applications` resource with properly 
      filled request that contains at least following data

      - Customer information are not necessary to send, however, sending them is highly recommended - it will simplify the application process for the client
        - Name (first name and last name or full name)
        - E-mail
        - Mobile phone number
        - Addresess (array)
          - City
          - Street
          - Street number
          - ZIP
          - Address type
      
      - Order details
        - Number
        - Total Price (including VAT)
        - Order items (array, at least one item is required)
          - Code
          - Order item name
          - Total price (all pieces, including VAT)
      
      - Financing type (always `INSTALLMENT`)
      - Financing type details
        - *Installment settings - preferred installment amount
        - *Installment settings - preferred down payment amount
        - *Installment settings - preferred program product code

      - Additional information necessary for the continuation and completion of the process
        - Your URL where the customer should be redirected after application approval
        - Your URL where the customer should be redirected after application rejection
        - URL of your notification endpoint you want us to send notifications about particular application updates to (in case the partner is using notifier)
      
      > * = Must be filled properly in case customer has already used installment calculator embedded on your website and selected preferred installment program. See the Installments calculator resources section for more details about possibility to embed installment calculator on your website. Leave empty otherwise.

      If the request was successfully processed, you receive HTTP status code 201 and Application object with at least following information in the response:

      - Application unique ID
      - Application state
      - Application substate
      - Gateway redirect URL where you should redirect a customer after processing of the response

      > You may also receive information about initially requested **down payment** - this 
      can be later changed by customer during the process of finalization of financing 
      application. In such cases we recommend you to check the final **down payment** of 
      approved loan (after the application is approved) via `/financing/v1/applications/{applicationId}`.

      If the request was **recognized as duplication**

      - and previously created `Application` is canceled (`Application.state = CANCELLED` and 
      `Application.stateReason = CANCELLED_NOT_PAID`), new `Application` is created, you 
      receive HTTP status code 201 and `Application` object with information specified above (at least) in the response
      - and previously created `Application` is still new (i.e. without any recorded action by a client), no `Application` is created, you receive HTTP status code 200 and the `Application` object created during the first related successful resource call.
      - and previously created `Application` is neither canceled nor new anymore, you receive HTTP status code 422 with error code `DUPLICATE_ORDER_NUMBER`.

      In case of an error, you receive one of the following results:

      | Status code | Code            | Explanation          |
      | ----------- | --------------- | -------------------- |
      | 400         | INVALID_REQUEST  | Request was not well formatted (malformed request syntax, size too large, etc.) |
      | 422         | UNPROCESSABLE | Request was well-formed but was unable to be followed due to semantic errors |
      | 422         | DUPLICATE_ORDER_NUMBER | Creating of Application with duplicated Order number is not allowed |
      | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable |

      ### Application detail

      If you need to find out current information about particular *application* - primarily its state 
      and other details - use `/financing/v1/applications/{applicationId}` resource where `{applicationId}` 
      is the application ID you received in the response of `/financing/v1/applications` after its creation

      | Financing type | Supported            |
      | ----------- | --------------- |
      | `INSTALLMENT`         | YES  |

      If the request was successfully processed, you receive HTTP status code 200 and application object with at least following information in the response:

      - Application unique ID
      - Application type
      - Application state
      - Application substate
      - Gateway redirect URL

      > You may also receive information about current **down payment** which is useful when 
      you need to find out whether customer's loan was approved with different down payment 
      than had been initially set in your embedded installment calculator.

      In other cases, you receive one of the following errors:

      | Status code | Code            | Explanation          |
      | ----------- | --------------- | -------------------- |
      | 400         | INVALID_REQUEST  | Request was not well formatted (malformed request syntax, size too large, etc.) |
      | 404         | APPLICATION_NOT_FOUND  | The requested resource could not be found |
      | 422         | NOT_SUPPORTED | Resource is not supported for given financing type |
      | 422         | UNPROCESSABLE | The request was well-formed but was unable to be followed due to semantic errors |
      | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable |

      ### Cancel application

      If there is need to completely cancel customer's order, it is necessary to cancel respective 
      *application*. For this purpose use `/financing/v1/applications/{applicationId}/cancel` 
      resource where `{applicationId}` is the *application* ID you received in the response of 
      `/financing/v1/applications` after its creation.

      | Financing type | Supported            |
      | ----------- | --------------- |
      | `INSTALLMENT`         | YES  |


      | Application state | Availability            |
      | ----------- | --------------- |
      | `REJECTED`         | YES  |
      | `CANCELED`         | YES  |
      | `PROCESSING`         | YES  |
      | `READY`         | YES  |

      If the request was successfully processed but the application had been already paid 
      (`Application.stateReason = READY_PAID`) you receive HTTP status code **202 ACCEPTED** 
      that means the process of a cancelation of the *application* began. It SHOULD be 
      completed after fulfilment of several back office manual actions.

      In other cases, when the request is successfully processed, you receive HTTP status code **200 OK**.

      You also receive at least following information about (soon to be) cancelled application in the response:

      - Application unique ID
      - Application type
      - Application state
      - Application substate

      In other cases, you receive one of the following errors:

      | Status code | Code            | Explanation          |
      | ----------- | --------------- | -------------------- |
      | 400         | INVALID_REQUEST  | Request was not well formatted (malformed request syntax, size too large, etc.) |
      | 404         | OBJECT_NOT_FOUND  | The requested resource could not be found |
      | 422         | NOT_SUPPORTED | Resource is not supported for given financing type |
      | 422         | UNPROCESSABLE | The request was well-formed but was unable to be followed due to semantic errors |
      | 422         | APPLICATION_REJECTED | When you try to cancel already `REJECTED` `Application`, which is not allowed |
      | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable |

      ### Change application order

      When there's some changes within order that may have an important impact on the 
      repayment process after its submission, use `/financing/v1/applications/{applicationId}/order` 
      resource in order we can adjust everything properly. `{applicationId}` is the application ID 
      you received in the response of `/financing/v1/applications` after its creation.

      | Financing type | Supported            |
      | ----------- | --------------- |
      | `INSTALLMENT`         | YES  |

      | Application state | Availability            |
      | ----------- | --------------- |
      | `REJECTED`         | NO  |
      | `CANCELED`         | NO  |
      | `PROCESSING`         | YES  |
      | `READY`         | YES* (see the availability note below)  |

      Use `/financing/v1/applications/{applicationId}/order` resource with properly filled 
      request that contains (only) changed data (resource allows partial put).

      > **AVAILABILITY NOTE**: Valid request object contains only order number (`order.number`) 
      and/or one item in the array `order.variableSymbols[]`. Supported `stateReason` of `state READY` 
      are `READY_TO_SHIP`, `READY_SHIPPED`, `READY_DELIVERING` (`state PROCESSING` is supported without any limitations).

      If the request was successfully processed, you receive HTTP status code 200 and 
      object of information about changed order plus basic information about respective 
      application (ID, state, substate) with at least following information in the response:

      - Order number
      - Order total price (including VAT)
      - Order items (array)
        - Order item name
        - Total price (all pieces, including VAT)
        - Order item state
      - Order state
      - Application basic information
        - ID
        - Application state
        - Application substate
      
      In other cases, you receive one of the following errors:

      | Status code | Code            | Explanation          |
      | ----------- | --------------- | -------------------- |
      | 400         | INVALID_REQUEST  | Request was not well formatted (malformed request syntax, size too large, etc.) |
      | 404         | OBJECT_NOT_FOUND  | The requested resource could not be found |
      | 422         | NOT_SUPPORTED | Resource is not supported for given financing type |
      | 422         | UNPROCESSABLE | The request was well-formed but was unable to be followed due to semantic errors |
      | 422         | APPLICATION_REJECTED | When you try to cancel already `REJECTED` `Application`, which is not allowed |
      | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable |

      ### Mark order as sent

      When the whole order was shipped to the customer, use `/financing/v1/applications/{applicationId}/order/send` 
      resource where `{applicationId}` is the application ID you received in the response of `/financing/v1/applications` after its creation.

      | Financing type | Supported            |
      | ----------- | --------------- |
      | `INSTALLMENT`         | YES  |

      | Application state | Availability            |
      | ----------- | --------------- |
      | `PROCESSING`         | NO  |
      | `REJECTED`         | NO  |
      | `CANCELLED`         | NO  |
      | `READY`         | YES (* available only when `Application.stateReason = READY_TO_SHIP`)  |

      If the request was successfully processed, you receive HTTP status code 200 and object 
      of information about changed order plus basic information about respective application 
      (ID, state, substate) with at least following information in the response:

      - Order number
      - Order total price (including VAT)
      - Order items (array)
        - Order item name
        - Total price (all pieces, including VAT)
        - Order item state
      - Order state
      - Application basic information
        - ID
        - Application state
        - Application substate
      
      In other cases, you receive one of the following errors:

      | Status code | Code            | Explanation          |
      | ----------- | --------------- | -------------------- |
      | 400         | INVALID_REQUEST  | Request was not well formatted (malformed request syntax, size too large, etc.) |
      | 404         | OBJECT_NOT_FOUND  | The requested resource could not be found |
      | 422         | NOT_SUPPORTED | Resource is not supported for given financing type |
      | 422         | UNPROCESSABLE | The request was well-formed but was unable to be followed due to semantic errors |
      | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable |

      ### Mark order as delivered

      When the whole order was delivered to the customer, use `/financing/v1/applications/{applicationId}/order/deliver` 
      resource where `{applicationId}` is the application ID you received in the response of `/financing/v1/applications` after its creation. 

      | Financing type | Supported            |
      | ----------- | --------------- |
      | `INSTALLMENT`         | YES  |

      | Application state | Availability            |
      | ----------- | --------------- |
      | `PROCESSING`         | NO  |
      | `REJECTED`         | NO  |
      | `CANCELED`         | NO  |
      | `READY`         | YES* (see the availability note below)  |

      > AVAILABILITY NOTE: Request is valid when `Application.stateReason = READY_TO_SHIP`. 
      Request is also valid after the transition of `Application` to the `stateReason = READY_DELIVERED` 
      or `stateReason = READY_PAID` (i.e. repeated valid requests return HTTP status code 200 OK unless the 
      `Application.stateReason = CANCELLED_RETURNED`)

      If the request was successfully processed, you receive HTTP status code 200 and object 
      of information about changed order plus basic information about respective application 
      (ID, state, substate) with at least following information in the response:

      - Order number
      - Order total price (including VAT)
      - Order items (array)
        - Order item name
        - Total price (all pieces, including VAT)
        - Order item state
      - Order state
      - Application basic information
        - ID
        - Application state
        - Application substate
      
      In other cases, you receive one of the following errors:

      | Status code | Code            | Explanation          |
      | ----------- | --------------- | -------------------- |
      | 400         | INVALID_REQUEST  | Request was not well formatted (malformed request syntax, size too large, etc.) |
      | 404         | OBJECT_NOT_FOUND  | The requested resource could not be found |
      | 422         | NOT_SUPPORTED | Resource is not supported for given financing type |
      | 422         | UNPROCESSABLE | The request was well-formed but was unable to be followed due to semantic errors |
      | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable |

      ### Orders

      If you need to find out current information about particular order - primarily its state 
      and other details - use `/financing/v1/orders{?applicationId}` resource where `{applicationId}` 
      is the application ID you received in the response of `/financing/v1/applications` after its creation.

      | Financing type | Supported            |
      | ----------- | --------------- |
      | `INSTALLMENT`         | YES  |

      | Application state | Availability            |
      | ----------- | --------------- |
      | `PROCESSING`         | YES  |
      | `REJECTED`         | YES  |
      | `CANCELED`         | YES  |
      | `READY`         | YES  |

      If the request was successfully processed, you receive HTTP status code 200 and object 
      of information about specified order plus basic information about respective application 
      (ID, state, substate) with at least following information in the response:

      - Order number
      - Order total price (including VAT)
      - Order items (array)
        - Order item name
        - Total price (all pieces, including VAT)
        - Order item state
      - Order state
      - Application basic information
        - ID
        - Application state
        - Application substate

      In other cases, you receive one of the following errors:

      | Status code | Code            | Explanation          |
      | ----------- | --------------- | -------------------- |
      | 404         | OBJECT_NOT_FOUND  | The requested resource could not be found |
      | 422         | UNPROCESSABLE | The request was well-formed but was unable to be followed due to semantic errors |
      | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable |
  - name: Health check
    description: |
      To easily find out current API state use the [API state check resource](./get-health-using-get).

      ## API health check

      If the API back-end services is up and running, you receive HTTP status code 204. In other cases, you receive one of the following errors:

      | Status code | Code            |
      | ----------- | --------------- |
      | 500         | SERVICE_FAILED  |
      | 504         | SERVICE_TIMEOUT |

      > Note: resource DOES require valid access_token in the HTTP header of the request

  - name: Scoring resources
    description: |
      Services that allow partner e-shops to find out a probability of
      *application's* approval.

      ### Precheck

      Simple operation for customer preliminary scoring. Returns a possible credit amount the customer 
      can obtain. It is best suitable for identifying clients who will probably be rejected. 
      Take into account that positive recommendation can not guarantee customer's approval as the result 
      is based only on a few elementary pieces of information about the customer.
      
      Resource has to be called with valid access token (see the [Security section](./security)) 
      from your server. If you plan to integrate it in a client flow, you should implement REST endpoint 
      bound to your shopping basket session that will be used as a proxy to call HC API - 
      **NEVER put access token directly to client side.**

      Possible error codes explanation:

      | Status code | Code            | Explanation          |
      | ----------- | --------------- | -------------------- |
      | 400         | INVALID_REQUEST  | Request was not well formatted (malformed request syntax, size too large, etc.) |
      | 500         | FAILURE | Internal failure |

      ### MultiPrecheck

      Multi precheck is basic Precheck run on many clients. Typically used outside businness 
      hours. Operation is asynchronous, partner gets only unique identifier of batch and the 
      result is available in Multi precheck result resource (see [Multi precheck result](#multi-precheck-result))

      Resource has to be called with valid access token (see the [Security section](./security)) 
      from your server. If you plan to integrate it in a client flow, you should implement REST endpoint 
      bound to your shopping basket session that will be used as a proxy to call HC API - 
      **NEVER put access token directly to client side.**

      Possible error codes explanation:

      | Status code | Code            | Explanation          |
      | ----------- | --------------- | -------------------- |
      | 400         | INVALID_REQUEST  | Request was not well formatted (malformed request syntax, size too large, etc.) |
      | 500         | FAILURE | Internal failure |

      ### Multi precheck result

      Getting result of finished multi precheck.

      In other cases, you receive one of the following errors:

      | Status code | Code            | Explanation          |
      | ----------- | --------------- | -------------------- |
      | 400         | INVALID_REQUEST  | Request was not well formatted (malformed request syntax, size too large, etc.) |
      | 404         | APPLICATION_NOT_FOUND  | The requested resource could not be found |
      | 422         | NOT_SUPPORTED | Resource is not supported for given financing type |
      | 422         | UNPROCESSABLE | The request was well-formed but was unable to be followed due to semantic errors |
      | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable |

      ### Multi precheck result notification

      Notification resource which needs to be provided by partner and the uri is specified 
      during initialization of multi precheck. Notification does not contain result of 
      customers precheck, only information, that results are now available.

  - name: Installments calculator resources
    description: |
      When you want to provide your customer (that wants to pay for a purchase by a loan) 
      an option to choose from available installment programs while he is still on your 
      website, it is necessary to implement "installments calculator".

      Choose one of the following approaches to integrate installments calculator into your website:

      - A) Implementing your own installment calculator, with your FE in your design that uses designated API resources ([described below](#implementing-own-installments-calculator)).


      - B) Integrating Home Credit's javascript widget (described in [special chapter](../Reference/java-script-widget-integration)) that:
        - provides GUI and front-end functionalities
        - process all needed calculations
        - provides necessary data to e-shop's back-end in order to easily use them within [*application* creation request](./create-using-post-3)

      > NOTE: Implementation of installment calculator is optional. Customers can always use the installment calculator embedded in Home Credit's front-end.


      ## Implementing own installments calculator

      In order to implement your own installment calculator (with your GUI design) you will need following resources:

      - `/financing/v1/installmentProgramsOffers` - to find out available installment programs offers and their details

      - `/financing/v1/installmentPrograms` - to find out details of a chosen installment program

      - `/financing/v1/installmentProgramsDownPayments` - to find out down payment options within available installment programs offers

      ### Installment programs offers

      When a customer wants to pay for a purchase by a loan and you want 
      to show him an offer of available installment programs, 
      use `/financing/v1/installmentProgramsOffers` resource with properly 
      filled request that contains at least following data:

      - Product set code (you should know the proper product set code from 
      Home Credit's sales representative or other similar source; 
      if you don't provide product set code, your default product set will be used)
      - Price of customer's purchase

      If the request was successfully processed, you receive HTTP status code 200 
      and array of objects of available installment programs with at least 
      following information in the response:

      - Installment program (array)
        - Installment program product code
        - Installment program type (in case of only one installment program offer 
        in response it is of type `FAVOURITE`)
        - Installment amount
        - Number of installments
      
      In other cases, you receive one of the following errors:

      | Status code | Code            | Explanation          |
      | ----------- | --------------- | -------------------- |
      | 400         | INVALID_REQUEST  | Request was not well formatted (malformed request syntax, size too large, etc.) |
      | 422         | UNPROCESSABLE | The request was well-formed but was unable to be followed due to semantic errors |
      | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable |

      Calculate installment programs offer according to specified input

      | feature | supported by resource |
      | ------- | --------------------- |
      | paging | no |
      | sorting | no |
      | filtering | no |

      ### Installment programs

      When a customer wants to know details of one of previously offered 
      installment programs use `/financing/v1/installmentPrograms` resource 
      with properly filled request that contains at least following data:

      - Product code of given installment program
      - Price of customer's purchase

      If the request was successfully processed, you receive HTTP status 
      code 200 and object of information about specified installment 
      program with at least following information in the response:

      - Installment program type
      - Installment amount
      - Number of installments
      - Installment program details

      In other cases, you receive one of the following errors:

      | Status code | Code            | Explanation          |
      | ----------- | --------------- | -------------------- |
      | 400         | INVALID_REQUEST  | Request was not well formatted (malformed request syntax, size too large, etc.) |
      | 422         | UNPROCESSABLE | The request was well-formed but was unable to be followed due to semantic errors |
      | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable |

      Calculate installment program detailed information. It returns the installment program that most closely matches specified input.

      ### Installment programs down payments

      When a customer wants to pay for a purchase by a loan and also 
      wants to choose own down payments settings within offered installment 
      programs, use `/financing/v1/installmentProgramsDownPayments` resource 
      with properly filled request that contains at least following data:

      - Product set code (you should know the proper product set code from 
      Home Credit's sales representative or other similar source)
      - Price of customer's purchase

      If the request was successfully processed, you receive HTTP status code 
      200 and object of information about available down payments settings 
      with at least following information in the response:

      - Minimum down payment amount
      - Maximum down payment amount
      - Step between given minimum and maximum down payment amounts

      In other cases, you receive one of the following errors:

      | Status code | Code            | Explanation          |
      | ----------- | --------------- | -------------------- |
      | 400         | INVALID_REQUEST  | Request was not well formatted (malformed request syntax, size too large, etc.) |
      | 422         | UNPROCESSABLE | The request was well-formed but was unable to be followed due to semantic errors |
      | 500         | INTERNAL_SERVER_ERROR | Unexpected condition was encountered and no more specific message is suitable |

      Calculate installment programs down payments according to specified input
  - name: Merchantsite resources
    description: | 
      Services that should be developed and exposed by partner e-shops to allow
      HC asynchronously inform these partner e-shops about important changes
      regarding particular *applications* and *orders*

      > **ATTENTION:** This set of APIs is NOT exposed from HC. Instead, it should be developed by partner and accept calls specified below.

      ## Application notification
      We use this resource when there is need to let you know about important changes within particular application. Namely in following situations:

      | Trigger | Corresponding Application.stateReason | Expected reaction |
      | ------- | ------------------------------------- | ----------------- |
      | Application was approved (approval process is proceeding correctly) | PROCESSING_APPROVED | Do not cancel customer's order prematurely |
      | Application was rejected | REJECTED | You should probably cancel respective order and release reserved goods |
      | Application was cancelled (before delivery) | CANCELLED_NOT_PAID | You should probably cancel respective order and release reserved goods |
      | Order to dispatch (we commit to finance customer's order) | READY_TO_SHIP | Dispatch the order to the customer |
      | Application is going to be paid out | READY_PAID | Wait for us processing financial compensation with you |

      We fill the request with at least following information:

      - Application unique ID
      - Application state
      - Application substate
      - Down payment
      - Timestamp of the notification
      - Hashed message (check sum)

      > USEFUL NOTE: If you think it takes us unusually long time to send you particular notification, do not hesitate to use `/financing/v1/applications/{applicationId}` resource (where `{applicationId}` is the application ID you received in the response of `/financing/v1/applications` after its creation) to directly find out information you seek.
