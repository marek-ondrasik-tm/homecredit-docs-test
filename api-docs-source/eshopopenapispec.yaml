  "/financing/v1/{application.merchantUrls.notificationEndpoint}":
    post:
      responses:
        "200":
          description: OK
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
              example:
                status: OK
        "400":
          description: Bad Request
          headers: {}
      summary: Application notification
      operationId: Application notification
      description: Notify partner about changes in application.
      tags:
        - Merchantsite resources
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Primary identifier of the application
                state:
                  type: string
                  enum:
                    - PROCESSING
                    - READY
                    - REJECTED
                    - CANCELED
                  description: Status of the application
                stateReason:
                  enum:
                  - PROCESSING_REDIRECT_NEEDED
                  - PROCESSING_PREAPPROVED
                  - PROCESSING_APPROVED
                  - PROCESSING_REVIEW
                  - PROCESSING_ALT_OFFER
                  - PROCESSING_SIGNED
                  - READY_TO_SHIP
                  - READY_SHIPPED
                  - READY_DELIVERING
                  - READY_DELIVERED
                  - READY_PAID
                  - REJECTED
                  - CANCELLED_NOT_PAID
                  - CANCELLED_RETURNED
                orderNumber:
                  type: string
                  description: Order number (internal for e-shop)
                notificationDate:
                  type: string
                  description: Time when notification was created (uses [ISO
                    8601](https://en.wikipedia.org/wiki/ISO_8601)
                    formatting)
                orderState:
                  type: string
                  enum:
                    - IN_PROCESS
                    - TO_SHIP
                    - SHIPPED
                    - CHECKING_DELIVERY
                    - DELIVERED
                    - PAID
                    - CANCELLED
                    - TERMINATED
                  description: Status of the Order
                downPayment:
                  type: object
                  properties:
                    amount:
                      type: number
                      description: Amount in minor units (150000 represents 1 500) [ISO
                        4217](https://en.wikipedia.org/wiki/ISO_4217)
                    currency:
                      type: string
                      description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
                        Only local currency is allowed (CZK in Czech
                        Republic and EUR in Slovakia).
                  required:
                    - amount
                    - currency
                  description: Current down payment set by a customer
                sendDate:
                  type: string
                  description: Time when notification was created (uses [ISO
                    8601](https://en.wikipedia.org/wiki/ISO_8601)
                    formatting)
                sequenceNumber:
                  type: number
                  description: Notification sequence number
                checkSum:
                  type: string
                  description: Message checksum - result of HMAC with SHA512 (secret key is used)
              required:
                - id
                - state
                - stateReason
                - orderNumber
                - notificationDate
                - orderState
                - downPayment
                - sentDate
                - checkSum
                - sequenceNumber
              example:
                id: 01-11200a0ee1
                state: PROCESSING
                stateReason: PROCESSING_APPROVED
                orderNumber: AA234
                notificationDate: 2017-07-15T00:00:00+02:00
                orderState: PROCESSING
                downPayment:
                  value: 300000
                  currency: CZK
                sequenceNumber: 1
                sentDate: 2017-07-16T00:00:00+02:00
                checksum: 443E150D3406F6A8DC62C1DB224AFDD84FA9907071BB1AD9B2C7701031793662191501B26AADF3A31361341EA176C80B23D8A9A5E5B5219538289945FE0C20A7
  /financing/v1/scorings/precheck/extended:
