    ScoringData:
      type: object
      required:
        - customer
      properties:
        customer:
          $ref: "#/components/schemas/PrecheckCustomer"
    PrecheckCustomer:
      type: object
      required:
        - firstName
        - lastName
        - email
        - phone
        - externalId
      properties:
        firstName:
          type: string
          example: John
          description: Customer first (given) name. String values longer than 100
            characters will be shortened to 100 characters.
        lastName:
          type: string
          example: Newborn
          description: Customer last (family) name. String values longer than 100
            characters will be shortened to 100 characters.
        email:
          type: string
          example: john.newborn@country.com
          description: E-mail address of customer. MUST be valid email according to [RFC
            2822](https://tools.ietf.org/html/rfc2822).
        phone:
          type: string
          example: "+420777123456"
          description: Mobile phone number with country code (including leading `+`).
        externalId:
          type: string
          example: "1576849"
          description: Unique customer's identifier in partner's system. Typically used
            for linking request and response together.

    PrecheckResult:
      type: object
      required:
        - id
        - recommendation
        - customer
        - potentialCreditAmount
      properties:
        id:
          type: string
          example: "1234"
          description: Unique identificator of Precheck. Send this identificator in
            ApplicationRequest to improve approval rate.
        recommendation:
          type: boolean
          description: |-
            A recommendation of whether the order should be passed to the HCO.

                true = Application is likely going to be approved.
            false = Application is likely going to be rejected.
        message:
          type: string
          example: V HCO peněžence nemáte dostatečný limit.
          description: Custom message for customer.
        customer:
          $ref: "#/components/schemas/PrecheckCustomer"
        potentialCreditAmount:
          $ref: "#/components/schemas/AmountOld"

    MultiPrecheckRequest:
      type: object
      required:
        - scoringData
      properties:
        scoringData:
          type: array
          items:
            $ref: "#/components/schemas/ScoringData"
        notificationEndpoint:
          type: string
          example: https://www.youreshop.cz/multiPrecheck/results
          description: URL of the partner used as a notification endpoint for providing
            information about result of multi precheck. Must be valid URL
            according to [RFC 3986](https://tools.ietf.org/html/rfc3986).
            Maximum 1000 characters.

    MultiPrecheckResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: Unique identifier of multi precheck's batch.

    BatchNotification:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          description: Unique identifier of multi precheck's batch.
        status:
          type: string
          enum:
            - SUCCESS
            - PARTIAL_SUCCESS
            - FAILURE
          description: Result of the precheck's batch.

    MultiPrecheckResult:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          description: Unique identifier of multi precheck's batch.
        status:
          type: string
          enum:
            - SUCCESS
            - PARTIAL_SUCCESS
            - FAILURE
            - PROCESSING
          description: Result of the precheck's batch.
        data:
          type: array
          items:
            $ref: "#/components/schemas/PrecheckResult"
          description: REQUIRED if precheck ended with `SUCCESS` or `PARTIAL_SUCCESS`

    AmountOld:
      type: object
      required:
        - amount
        - currency
      properties:
        amount:
          type: number
          example: 133000
          description: Amount in minor units (133000 represents 1330) [ISO
            4217](https://en.wikipedia.org/wiki/ISO_4217)
        currency:
          type: string
          example: CZK
          description: Amount currency [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217).
            Only local currency is allowed (CZK in Czech Republic and EUR in
            Slovakia).

    Error:
      type: object
      required:
        - code
        - message
        - severity
      properties:
        code:
          type: string
          example: BAD_REQUEST
          description: Unique internal error code
        message:
          type: string
          example: Bad request
          description: Human readable error description (non-localized)
        severity:
          type: string
          enum:
            - ERROR
            - WARN
            - INFO
        attribute:
          type: string
          example: customer.addresses[1].streetNumber
          description: JSON path of request attribute that caused the error (if applicable)
        ticketId:
          type: string
          example: UAT1:AMS:20160516-091658.450:45e4
          description: Internal ticket ID, used for error backtracking

    Errors:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
          description: Array with errors
