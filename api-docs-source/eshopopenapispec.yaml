paths:
  /authentication/v1/partner:
    post:
      responses:
        "200":
          description: Partner acces token issued
          headers: {}
          content:
            application/json; charset=utf-8:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: Access token
                  expiresIn:
                    type: number
                    description: Token validity remaining time (in seconds)
                  tokentype:
                    type: string
                    description: token type. Always "bearer".
                required:
                  - accessToken
                  - tokentype
              examples:
                response:
                  value:
                    accessToken: TokenForPartnerTokenForPartnerTokenForPartnerTokenForPartner
                    expiresIn: 7200
                    tokentype: bearer
        "400":
          description: Unable to authenticate partner
          headers: {}
          content:
            application/json; charset=utf-8:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: Unique internal error code
                        message:
                          type: string
                          description: Human readable error description (non-localized)
                        severity:
                          type: string
                          enum:
                            - ERROR
                            - WARN
                            - INFO
                        attribute:
                          type: string
                          description: JSON path of request attribute that caused the error (if
                            applicable)
                        ticketId:
                          type: string
                          description: Internal ticket ID, used for error backtracking
                      required:
                        - code
                        - message
                        - severity
                    description: Array with errors
                required:
                  - errors
              examples:
                response:
                  value:
                    errors:
                      - code: BAD_REQUEST
                        message: Bad request
                        severity: ERROR
                        attribute: customer.addresses[1].streetNumber
                        ticketId: UAT1:AMS:20160516-091658.450:45e4
      summary: Login partner
      operationId: Login partner
      description: Partner authenticate himself and obtain acces token
      tags:
        - Security
      requestBody:
        content:
          application/json; charset=utf-8:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Partner username
                password:
                  type: string
                  description: Partner secret password
              required:
                - username
                - password
              example:
                username: eShop
                password: eShopSecretPassword
