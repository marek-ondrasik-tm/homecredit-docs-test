servers:
  - url: //private-09088c-csfinancingv3.apiary-mock.com
components:
  schemas:
    AcademicIdentificationDocumentFull:
      type: object
      required:
        - firstName
        - lastName
        - number
        - type
      properties:
        firstName:
          type: string
          description: Academic card first name
        issuer:
          type: string
          description: Issuer of document
        lastName:
          type: string
          description: Academic card last name
        number:
          type: string
          description: Number of the identification document
          minLength: 0
          maxLength: 100
        type:
          type: string
          description: Academic card type
          enum:
            - ALIVE
            - ISIC
            - ISIC_SCHOLAR
            - ITIC
            - IYTC
        validity:
          type: string
          format: date
          description: Date, until which the document is valid<br>Required only in
            FullDocument context
      title: AcademicIdentificationDocumentFull
    AccountIban:
      type: object
      required:
        - iban
      properties:
        iban:
          type: string
      title: AccountIban
    AccountNational:
      type: object
      required:
        - accountNumber
        - bankCode
      properties:
        accountNumber:
          type: string
