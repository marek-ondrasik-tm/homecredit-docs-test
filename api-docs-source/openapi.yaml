    description: Set of resources to access client's accounts.
servers:
  - url: https://api.homecredit.cz/banking/v1
components:
  schemas:
    Transactions: {}
    Payments: {}
    Contract:
      type: object
      required:
        - contractNumber
        - name
        - approveDate
        - signedAt
        - balance
        - paymentInfo
      properties:
        contractNumber:
          type: string
          example: "12345678"
          description: ID of a contract
        name:
          type: string
          example: Tesco karta
          description: human-readable contract (product) name
        approveDate:
          type: string
          example: 2017-01-08
          description: date when contract was approved
        signedAt:
          type: string
          example: 2016-01-25
          description: date when contract was signed
        balance:
          type: object
          required:
            - actual
            - available
            - balanceDate
          properties:
            actual:
              $ref: "#/components/schemas/Amount"
            available:
              $ref: "#/components/schemas/Amount"
            balanceDate:
              type: string
              example: 2018-01-18T10:00Z
              description: reference time of balance information validity
        paymentInfo:
          $ref: "#/components/schemas/PaymentAvailability"
    PaymentAvailability:
      type: object
      required:
        - limitFrom
        - limitTo
      properties:
        limitFrom:
          $ref: "#/components/schemas/Amount"
        limitTo:
          $ref: "#/components/schemas/Amount"
        overpayment:
          $ref: "#/components/schemas/Amount"
    Transaction:
      type: object
      required:
        - id
        - contractNumber
        - amount
        - direction
        - status
        - valueDate
      properties:
        id:
          type: string
          example: T12312345
          description: internal transaction identifier
        contractNumber:
          type: string
          example: "123456789"
          description: contract to that transaction belongs (to which it is accounted)
        amount:
          $ref: "#/components/schemas/Amount"
        direction:
          type: string
          enum:
            - CREDIT
            - DEBIT
          description: direction of transaction
        status:
          type: string
          enum:
            - UNPROCESSED
            - PROCESSED
          description: transaction status
        partyAccount:
          $ref: "#/components/schemas/BankAccount"
        partyDescription:
          type: string
          example: John Doe
          description: party description
        valueDate:
          type: string
          example: 2016-02-10T10:00Z
          description: transaction value date, e.g. the day transaction "happened"
        bookingDate:
          type: string
          example: 2016-02-09T10:00Z
          description: transaction booking date, e.g. the day transaction was bookkeeped
        payerMessage:
          type: string
          example: need to pay this
          description: message for payer. Empty for incoming transactions.
        payeeMessage:
          type: string
          example: info
          description: message for payee (e.g. for client receiving transaction)
        transactionFeeCanceled:
          type: boolean
          description: set to true if transaction fee is canceled.
        additionalInfoDomestic:
          $ref: "#/components/schemas/TransactionInfoDomestic"
        additionalInfoForeign:
          $ref: "#/components/schemas/TransactionInfoForeign"
        additionalInfoCard:
          $ref: "#/components/schemas/TransactionInfoCard"
    TransactionInfoDomestic:
      type: object
      properties:
        constantSymbol:
          type: string
          example: "0558"
        variableSymbol:
          type: string
          example: "9"
        specificSymbol:
          type: string
          example: "100011"
    TransactionInfoCard:
      type: object
      required:
        - cardNumber
      properties:
        mcc:
          type: string
          example: "3081"
          description: Merchant Category code
        merchantName:
          type: string
          example: SomeCompany, Ltd.
        cardNumber:
          type: string
          example: 34xx-xxxx-xxxx-6289
          description: Masked card number used for transaction
        cardName:
          type: string
          example: Šikovná karta Home Credit
          description: Card name
    TransactionInfoForeign:
      type: object
      properties:
        originalValue:
          $ref: "#/components/schemas/Amount"
        exchangeRate:
          type: number
          example: 12.8
          description: exchange rate valid at the time of transfer
    PaymentInitialization:
      type: object
      required:
        - bankAccount
        - amount
      properties:
        bankAccount:
          $ref: "#/components/schemas/BankAccount"
        amount:
          $ref: "#/components/schemas/Amount"
        messageForPayer:
          type: string
          example: I am your father
          description: Message for payer
        messageForPayee:
          type: string
          example: Search your feelings
          description: Message for payee
        variableSymbol:
          type: string
          example: "123456789"
          description: Variable symbol of payment
        specificSymbol:
          type: string
          example: "123456789"
          description: Specific symbol of payment
        constantSymbol:
          type: string
          example: "0123"
          description: Constant symbol of payment
        paymentId:
          type: string
          example: A11223344
          description: Existing payment ID (used in repeated requests, when OTP needs to
            be generated again)
    PaymentInitializationResponse:
      type: object
      required:
        - paymentId
      properties:
        paymentId:
          type: string
          example: A11223344
          description: Payment request ID
        key:
          type: string
          example: 011173bc-13d8-4467-a096-b8680b122fc3
          description: Payment authorization key (it is known only to application)
    PaymentAuthorization:
      type: object
      required:
        - smsAuthorization
      properties:
        smsAuthorization:
          type: object
          required:
            - key
            - code
          properties:
            key:
              type: string
              example: 011173bc-13d8-4467-a096-b8680b122fc3
              description: Payment verification key (it is known only to application)
            code:
              type: string
              example: "12345"
              description: Payment OTP - code sent through SMS
          description: Authorization info for SMS (OTP) authorization type
    Payment:
      type: object
      required:
        - paymentId
      properties:
        paymentId:
          type: string
          example: A11223344
          description: Payment ID
    BankAccount:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - IBAN
            - NATIONAL
          description: Account type
    AccountIBAN:
      type: object
      required:
        - iban
      properties:
        iban:
          type: string
          example: CZ6508000000192000145399
          description: Account number in IBAN format
    AccountNational:
      type: object
      required:
        - accountNumber
        - bankCode
      properties:
        prefix:
          type: string
          example: "000000"
          description: Account number prefix. For domestic accounts, this will be
            specified in national format.
        accountNumber:
          type: string
          example: "1235335010"
          description: Account number. For domestic accounts, this will be specified in
            national format.
        bankCode:
          type: string
          example: "3030"
          description: For domestic accounts, bank code in national format
    Error:
      type: object
      required:
        - code
        - message
        - severity
      properties:
        code:
          type: string
          example: ERR_1000_SOME_ERROR_CODE
          description: unique internal error code
        message:
          type: string
          example: Some error/validation message description
          description: human readable error description (non-localized)
        severity:
          type: string
          enum:
            - ERROR
            - WARN
            - INFO
        attribute:
          type: string
          example: personalBirthNumber
          description: json path of request attribute that caused the error (if applicable)
        ticketId:
          type: string
          example: UAT1:AMS:20160516-091658.450:45e4
          description: internal ticket ID, used for error backtracking
    Errors:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
    Authorization:
      type: object
      properties:
        blockedUntil:
          type: string
          example: 2017-01-18T10:34:44+01:00
          description: requested operation is blocked until specified time
    PagingInfo:
      type: object
      required:
        - itemsPerPage
      properties:
        itemsPerPage:
          type: number
          example: 10
          description: Number of items per page
        nextPage:
          type: string
          example: banking/v1/my/contracts/123456789/transactions?limit=10&after=30
          description: Request to retrieve next page, if it exists and can be
            unambiguously specified
        prevPage:
          type: string
          example: banking/v1/my/contracts/123456789/transactions?limit=10&before=20
          description: Request to retrieve previous page, if it exists and can be
            unambiguously specified
    Amount:
      type: object
      required:
        - value
        - currency
      properties:
        value:
          type: number
          example: 125.9
          description: Amount in major currency unit (two digits used after decimal
            separator which is '.')
        currency:
          type: string
          example: CZK
          description: Amount currency. [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217)
    TokenCodeRequest:
      type: object
      required:
        - grant_type
        - client_id
        - client_secret
      properties:
        grant_type:
          type: string
          enum:
            - authorization_code
            - refresh_token
          description: grant flow type, only `authorization_code` and `refresh_token` is
            supported
        client_id:
          type: string
          example: <your client ID>
          description: client_id parameter of your application, received at application
            registration
        client_secret:
          type: string
          example: <your client secret>
          description: client_secret parameter of your application, received at
            application registration
    TokenResponse:
      type: object
      required:
        - token_type
        - access_token
        - expires_in
      properties:
        refresh_token:
          type: string
          example: 7dbadd74c434439db4fc9b2bbf8cabb3
          description: refresh token, if supported
        token_type:
          type: string
          example: bearer
          description: token type. Always "bearer".
        access_token:
          type: string
          example: ccafe62cbce645ce95b2acce839f4acc
          description: access token, to be included in API request
        expires_in:
          type: number
          example: 7200
          description: access token validity, in seconds
    Exchange_code_for_token: {}
    Customer_s_contracts: {}
    Payment_OTP_authorization: {}
    Specific_payment: {}
