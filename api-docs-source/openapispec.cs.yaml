          $ref: "#/components/schemas/Amount"
        productCode:
          type: string
          example: "'COCONL06'"
          description: Kód produktu (získaný z výsledku výpočtu).
        flags:
          type: array
          items:
            anyOf:
              - null
              - type: string
                enum:
                  - BUYBACK
          description: Typ splátkového programu. Obvykle se používá u více financování.
    FinancingOriginationContext:
      type: object
