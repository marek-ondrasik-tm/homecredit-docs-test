          description: Pole všech identifikátorů předběžné kontroly souvisejících s touto
            aplikací. Pokud partner provedl operaci předběžné kontroly s údaji
            tohoto zákazníka, MĚL BY do tohoto atributu zadat identifikátor
            předběžné kontroly (precheckId). MĚL BY to být platný identifikátor
            předběžné kontroly. Viz Operace předběžné kontroly a jejich odezva.
        sourceId:
          type: string
          example: Cash_10_2020
          description: Identifikátor zdroje nebo kampaně, ze které pochází potenciální
            zákazník. Partner BY MĚL poskytnout platné `sourceId`.
        extendedData:
          type: array
          items:
            $ref: "#/components/schemas/KeyValue"
          description: "Další údaje o původu aplikace. Seznam podporovaných klíčů pro
            extendedData: utm_source, utm_medium, utm_campaign, utm_term,
            utm_content, gclid, fbclid, url."
