    #### 2.2 Zákazník - hlavní změny

    | Změna | v1 | v3 | Dopad |
    |-------|----|----|-------|
    | **Struktura zákazníka** | Přímé atributy (`firstName`, `lastName`, ...) | Typované struktury podle typu zákazníka (`person`, `entrepreneur`, `legalEntity`) | **VYSOKÝ** - Nutná refaktorizace všech volání |
    | **Požadavek zákazníka** | `required` (s možností volitelných atributů) | `required` s `type`, ale data mohou být `optional` pro proces `ONLINE` | **STŘEDNÍ** |
    | **E-mail a telefon** | Přímé atributy | Pole `contacts[]` s typem kontaktu | **VYSOKÁ** |
    | **Adresy** | `addresses[].addressType` enum | Pole `addresses[].flags[]` | **STŘEDNÍ** |
    | **IP adresa** | `customer.ipAddress` | `customer.person.ipAddress` / `customer.entrepreneur.ipAddress` / `customer.legalEntity.ipAddress` | **NÍZKÁ** |
    | **Identifikace osoby** | Není v základní struktuře | `customer.person.identificationNumber` | **NÍZKÁ** - nové pole |

    ##### Příklad migrace:

    **v1:**

    ```json
    {
      "customer": {
        "firstName": "John",
        "lastName": "Newborn",
        "email": "john@example.com",
        "phone": "+420777123456",
        "addresses": [{
          "city": "Praha",
          "addressType": "PERMANENT"
        }]
      }
    }
    ```

    **v3:**

    ```json
    {
      "customer": {
        "type": "PERSON",
        "person": {
          "firstName": "John",
          "lastName": "Newborn",
          "contacts": [
            {
              "type": "EMAIL",
              "email": { "value": "john@example.com" }
            },
            {
              "type": "MOBILE",
              "mobile": { 
                "countryCode": "+420",
                "value": "777123456" 
              }
            }
          ],
          "addresses": [{
            "city": "Prague",
            "flags": ["PERMANENT"]
          }]
        }
      }
    }
    ```

    #### 2.3 Objednávka - hlavní změny

    | Změna | v1 | v3 | Dopad |
    |-------|----|----|-------|
    | **Umístění objednávky** | Kořenová úroveň `order` | Vnořeno do `financedSubject.order` | **VYSOKÝ** |
    | **Typ objednávky** | Neexistuje | `type`: `STANDARD` / `BROKERED` | **VYSOKÝ** - nová požadovaná struktura |
    | **Financování** | `type` + `settingsInstallment` na kořenové úrovni | Pole `financings[]` v rámci `order` | **VYSOKÝ** - změna struktury financování |
    | **Položky** | Vždy požadované | Požadované pouze pro `STANDARD`, volitelné pro `BROKERED` | **STŘEDNÍ** |
    | **MerchantUrls** | Kořenová úroveň `merchantUrls` | Přesunuto do `originationContext.channel.online` | **VYSOKÁ** |
    | **Proměnné symboly** | `variableSymbols[]` pole | `variableSymbol` string (jednoduchý) + `specificSymbol` | **STŘEDNÍ** |

    ##### Příklad migrace:

    **v1:**

    ```json
    {
      "order": {
        "number": "AA234",
        "variableSymbols": ["123456", "1234567"],
        "totalPrice": { "amount": 133000, "currency": "CZK" },
        "items": [...]
      },
      "type": "INSTALLMENT",
      "settingsInstallment": {
        "preferredMonths": 6,
        "productCode": "COCONL06"
      },
      "merchantUrls": {
        "approvedRedirect": "https://...",
        "rejectedRedirect": "https://...",
        "notificationEndpoint": "https://..."
      }
    }
    ```

    **v3:**

    ```json
    {
      "financedSubject": {
        "type": "ORDER",
        "order": {
          "type": "STANDARD",
          "number": "AA234",
          "variableSymbol": "123456",
          "specificSymbol": "1122334455",
          "totalPrice": { "value": 133000, "currency": "CZK" },
          "financings": [{
            "type": "INSTALLMENT",
            "installment": {
              "preferredMonths": 6,
              "productCode": "COCONL06"
            }
          }],
          "standard": {
            "deliveryType": "DELIVERY_CARRIER",
            "items": [...]
          }
        }
      },
      "originationContext": {
        "channel": {
          "type": "ONLINE",
          "online": {
            "approvedRedirect": "https://...",
            "rejectedRedirect": "https://...",
            "notificationEndpoint": "https://..."
          }
        }
      }
    }
    ```

    #### 2.4 ApplicationResponse - hlavní změny

    | Atribut | v1 | v3 | Dopad |
    |---------|----|----|-------|
    | **Stav aplikace** | `state` + `stateReason` | Pouze `status` | **VYSOKÝ** - sloučení stavů |
    | **URL brány** | `gatewayRedirectUrl` přímo | `workflowSteps[]` s objektem `redirect` | **STŘEDNÍ** |
    | **Stav objednávky** | Přímo v odpovědi | Pouze přes `GET /applications/{id}` | **STŘEDNÍ** |

    ##### Mapování stavu v1 → v3:

    | v1 `state` | v1 `stateReason` | v3 `status` |
    |------------|------------------|-------------|
    | `PROCESSING` | `PROCESSING_REDIRECT_NEEDED` | `CREATED` |
    | `PROCESSING` | `PROCESSING_PREAPPROVED` | `PRESCORED` |
    | `PROCESSING` | `PROCESSING_APPROVED` | `APPROVED` |
    | `PROCESSING` | `PROCESSING_REVIEW` | `VERIFICATION` |
    | `PROCESSING` | `PROCESSING_ALT_OFFER` | `ALTERNATIVE` |
    | `PROCESSING` | `PROCESSING_SIGNED` | `APPROVED` |
    | `PŘIPRAVENO` | `PŘIPRAVENO_K_ODESLÁNÍ` | `POTVRZENO` + objednávka `K_ODESLÁNÍ` |
    | `PŘIPRAVENO` | `PŘIPRAVENO_ODESLÁNO` | `POTVRZENO` + objednávka `ODESLÁNO` |
    | `PŘIPRAVENO` | `PŘIPRAVENO_DODÁVÁNO` | `POTVRZENO` + objednávka `KONTROLA_DODÁVKY` |
    | `PŘIPRAVENO` | `PŘIPRAVENO_DORUČENO` | `POTVRZENO` + objednávka `DORUČENO` |
    | `PŘIPRAVENO` | `PŘIPRAVENO_ZAPLACENO` | `POTVRZENO` + objednávka `ZAPLACENO` |
    | `ZAMÍTNUTO` | `ZAMÍTNUTO` | `ZAMÍTNUTO` |
    | `ZRUŠENO` | `ZRUŠENO_NEZAPLACENO` | `ZRUŠENO` + objednávka `ZRUŠENO` |
    | `ZRUŠENO` | `ZRUŠENO_VRÁCENO` | `ZRUŠENO` + objednávka `UKONČENO` |

    **DŮLEŽITÉ:** Ve verzi v3 je stav objednávky oddělen od stavu aplikace. Pro úplné informace použijte koncový bod `GET /financing/v3/applications/{applicationId}`.

    #### 2.5 Oznámení - změny struktury

    | Změna | v1 | v3 | Dopad |
    |-------|----|----|-------|
    | **Struktura** | Ploché atributy | Objekt `notificationContent` | **STŘEDNÍ** |
    | **Stav aplikace** | `stateReason` | `applicationStatus` | **VYSOKÝ** - různé hodnoty |
    | **Stav objednávky** | `orderState` | `orderStatus` | **NÍZKÝ** - přejmenování |
    | **Záloha** | `AmountOld` (částka + měna) | `Amount` (hodnota + měna) | **NÍZKÝ** - přejmenování atributu |

    ### 3. Změny v životním cyklu

    #### 3.1 Vytvoření aplikace

    **Dostupnost:** Žádná změna v obou verzích  
    **Metoda HTTP:** `POST`  
    **Dopad změny:** **KRITICKÝ**

    **Klíčové změny:**
    1. Zcela odlišná struktura požadavku (viz sekce [2.1](#21-applicationrequest---major-structural-changes) - [2.3](#23-order---major-changes))
    2. Změna struktury odpovědi
    3. Duplicitní logika zůstává stejná (200 vs 201 vs 422)

    #### 3.2 Podrobnosti aplikace

    | Operace | v1 | v3 | Změna |
    |---------|----|----|-------|
    | **Získat podrobnosti o žádosti** | `GET /financing/v1/applications/{applicationId}` | `GET /financing/v3/applications/{applicationId}` | **NOVÝ koncový bod ve v3** - doporučeno implementovat |
    | **Získat objednávku** | `GET /financing/v1/orders?applicationId={id}` | Odstraněno | Podrobnosti objednávky nyní prostřednictvím podrobností aplikace |

    **Dopad:** **STŘEDNÍ** - změna způsobu získávání informací o objednávce

    #### 3.3 Označit zásilku/dodávku

    | Operace | v1 | v3 | Dopad |
    |---------|----|----|-------|
    | **Označit jako odeslané** | `PUT /financing/v1/applications/{id}/order/send` | `PUT /financing/v3/applications/{id}/orders/ship` | **NÍZKÝ** - změna URL |
    | **Označit jako doručené** | `PUT /financing/v1/applications/{id}/order/deliver` | `PUT /financing/v3/applications/{id}/orders/deliver` | **NÍZKÝ** - změna URL |

    **Klíčová změna:** Ve verzi v3 neexistuje koncový bod pro `send`, pouze `ship` a `deliver`.

    **Dostupnost ve verzi v3:**

    - **Odeslat:** Pouze pro stavy `CONFIRMED` + `TO_SHIP`

    - **Doručit:** Pouze pro stavy `CONFIRMED` + `TO_SHIP`

    **Odpověď ve verzi v3:** Stav 204 (bez obsahu) namísto 200 s tělem odpovědi

    #### 3.4 Zrušení žádosti

    | Operace | v1 | v3 | Dopad |
    |---------|----|----|-------|
    | **Zrušení žádosti** | `PUT /financing/v1/applications/{id}/cancel` | `PUT /financing/v3/applications/{id}/cancel` | **NÍZKÝ** |

    **Klíčové změny:**
    1. Mírně upravené tělo požadavku (v zásadě stejné hodnoty výčtu `reason`)
    2. Odpověď ve v3: Stav 200 (namísto 200 s objektem Application)
    3. Dostupnost ve v3 je rozšířena (lze zrušit více stavů)

    **Nové stavy dostupné pro zrušení ve v3:**

    - `CREATED` + `IN_PROCESS`

    - `PRESCORED` + `IN_PROCESS`

    - `ALTERNATIVE` + `IN_PROCESS`

    - `APPROVED` + `IN_PROCESS`

    - `CONFIRMED` + všechny kromě `PAID`

    - `CANCELLED` + `CANCELLED` (idempotentní)

    #### 3.5 Úprava objednávky

    **v1:** `PUT /financing/v1/applications/{applicationId}/order`  
    **v3:** **Odstraněno**

    **Dopad:** **VYSOKÝ** - pokud byl tento koncový bod používán ke změně čísla objednávky nebo symbolu proměnné, je nutné najít alternativní řešení.

    ### 4. Nové funkce ve verzi v3

    #### 4.1 Podpora zprostředkovaných objednávek

    Verze v3 zavádí možnost vytvářet "zprostředkované" objednávky pro obchodní vztahy mezi více stranami.

    **Příklad použití:**

    ```json

    {
      "financedSubject": {
        "type": "ORDER",
        "order": {
          "type": "BROKERED",
          "brokered": {
            "merchantOrders": [
              {
                "name": "MALL",
                "number": "22222222",
                "items": [...]
              }
            ]
          }
        }
      }
    }

    ```

    #### 4.2 Podpora podnikatelů a právnických osob

    Ve verzi v3 lze nyní vytvářet aplikace pro:

    - `PERSON` (fyzická osoba) - odpovídá verzi v1

    - `ENTREPRENEUR` (podnikatel)

    - `LEGAL_ENTITY` (právnická osoba)

    #### 4.3 Kroky pracovního postupu

    Odpověď v3 obsahuje `workflowSteps[]` - strukturované informace o dalších krocích procesu.

    #### 4.4 Kontext vzniku

    Nová struktura pro sledování zdroje žádosti:

    - `precheckIds` - odkaz na předběžnou kontrolu

    - `sourceId` - identifikátor kampaně

    - `extendedData` - parametry UTM, informace o sledování

    ### 5. Změny formátu dat

    #### 5.1 Struktura částky

    | v1 | v3 |
    |----|-----|
    | `{ "amount": 13300, "currency": "CZK" }` | `{ "value": 13300, "currency": "CZK" }` |

    **Dopad:** **STŘEDNÍ** - všude, kde se používá částka, musí být změněno `amount` → `value`.

    #### 5.2 Struktura telefonního čísla

    | v1 | v3 |
    |----|-----|
    | `"phone": "+420777123456"` | `"mobile": { "countryCode": "+420", "value": "777123456" }` |

    **Dopad:** **STŘEDNÍ** - analýza telefonního čísla

    #### 5.3 Příznaky adresy vs. addressType

    | v1 | v3 |
    |----|-----|
    | `"addressType": "PERMANENT"` | `"flags": ["PERMANENT"]` |

    **Dopad:** **NÍZKÝ** - změna z výčtu na pole

    ### 6. Změny parametrů přesměrování URL

    Při přesměrování zákazníka zpět na partnerský web v3 přidává/upravuje parametry:

    | Parametr | v1 | v3 |
    |----------|----|----|
    | `stateReason` | Ano | Odstraněno |
    | `applicationStatus` | Ne | Nové |
    | `orderStatus` | Ne | Nové |
    | `orderNumber` | Ano | Ano (pokud je k dispozici) |
    | `applicationId` | Ano | Ano |
    | `withdrawal` | Ano | Ano (pokud je k dispozici) |
    | `downPayment` | Ano | Ano |
    | `checkSum` | Ano | Ano (`checksum`) |

    **Dopad:** **STŘEDNÍ** - je třeba aktualizovat analýzu parametrů přesměrování
