                    orderStatus:
                      type: string
                      enum:
                        - IN_PROCESS
                        - TO_SHIP
                        - SHIPPED
                        - CHECKING_DELIVERY
                        - DELIVERED
                        - PAID
                        - CANCELLED
                        - TERMINATED
                      description: Stav objednávky
                    downPayment:
                      type: object
                      properties:
                        value:
                          type: number
                          description: Částka v menších jednotkách (150000 představuje 1 500) [ISO
                            4217](https://en.wikipedia.org/wiki/ISO_4217)
                        currency:
                          type: string
                          description: Měna částky [ISO 4217](https://en.wikipedia.org/wiki/ISO_4217). Je
                            povolena pouze místní měna (CZK v České republice a
                            EUR na Slovensku).
                      required:
                        - value
                        - currency
                      description: Aktuální záloha stanovená zákazníkem
                    notificationDate:
                      type: string
                      description: Čas, kdy bylo oznámení vytvořeno (používá formátování [ISO
                        8601](https://en.wikipedia.org/wiki/ISO_8601))
                    sequenceNumber:
                      type: number
