  /financing/v3/applications:
    post:
      responses:
        "200":
          description: Aplikace byla vytvořena v minulosti (nic se nezměnilo)
          headers: {}
          content:
            application/json;charset=UTF-8:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Primární identifikátor aplikace
                  status:
                    type: string
                    enum:
                      - CREATED
                      - PRESCORED
                      - ALTERNATIVE
                      - VERIFICATION
                      - APPROVED
                      - CONFIRMED
                      - REJECTED
                      - CANCELLED
                    description: Stav žádosti
                  workflowSteps:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          enum:
                            - REDIRECT
                            - DELIVERY
                            - CANCELLATION
                          description: Kód pracovního postupu
                        priority:
                          type: number
                          description: Identifikátor priority kroku pracovního postupu vyjádřený číslem
                            (nejnižší číslo znamená nejvyšší prioritu)
                        mandatory:
                          type: boolean
                          description: K dispozici je krok pracovního postupu pro aktuální žádost v
