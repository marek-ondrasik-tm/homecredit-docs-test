            [RFC 3986](https://tools.ietf.org/html/rfc3986). URL BY MĚLA
            obsahovat schéma (například `https://`), jinak některé prohlížeče
            zákazníka správně nepřesměrují.  NESMÍ být delší než 1000 znaků.
        rejectedRedirect:
          type: string
          example: https://www.partnereshop.cz/kosik
          description: URL partnera používaná pro přesměrování zákazníka zpět na web
            partnera po zamítnutí žádosti. MUSÍ být platná URL podle [RFC
            3986](https://tools.ietf.org/html/rfc3986). URL BY MĚLA obsahovat
            schéma (například `https://`), jinak některé prohlížeče zákazníka
            správně nepřesměrují. NESMÍ být delší než 1000 znaků.
        notificationEndpoint:
          type: string
          example: https://www.partnereshop.cz/order/AA234
          description: URL partnera používaná jako koncový bod pro zasílání oznámení
            partnerovi o důležitých aktualizacích v procesu žádosti (schválení,
            zamítnutí, zrušení atd.). MUSÍ být platnou URL podle [RFC
            3986](https://tools.ietf.org/html/rfc3986). URL by měla obsahovat
            schéma (například `https://`). Nesmí být delší než 1000 znaků.
    ApplicationBase:
