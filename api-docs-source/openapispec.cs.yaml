                  applicationId: 123e4567-e89b-12d3-a456-426655440000
                  applicationStatus: CONFIRMED
                  orderNumber: AA234
                  orderStatus: TO_SHIP
                  downPayment:
                    value: 150000
                    currency: CZK
                  notificationDate: 2020-07-15T00:00:00+02:00
                  sequenceNumber: 1
                sentDate: 2020-07-15T00:00:00+02:00
                checksum: f61c69a259b702d564b2032e554984dec3b713ff7bdde17fcb727d403ea0d730816f46ad2bbc06a1914225d5dfba0396927dbf1b0698081814877b5486950a15
tags:
  - name: Security
    description: >-
      Pro přístup k našemu API musí partner nejprve získat *přístupový token*;
      tento token je řetězec libovolné délky (30+ znaků) a musí být zahrnut v
      hlavičce HTTP u každého požadavku na API. Tato část popisuje způsob, jak
      získat platný přístupový token a použít jej pro přístup k chráněným
      zdrojům.


      - k získání přístupového tokenu použijte zdroj
      `/authentication/v1/partner` s příslušnými parametry (viz [dokumentace
      zdroje `/authentication/v1/partner`](./login-partner))


      - přístupový token by měl být přítomen v každém požadavku pomocí hlavičky
      požadavku `Authorization`, s typem `Bearer`. Pokud má přístupový token
      partnera hodnotu `secret_token`, měl by být specifikován následovně:


      `Authorization: Bearer secret_token`


      Skutečný příklad použití curl bude tedy vypadat takto:


      ```

      curl -H &quot;Authorization: Bearer secret_token&quot;
      https://api.homecredit.cz/financing/v3/applications

      ```


      - přístupový token má omezenou platnost (2 hodiny). Po uplynutí platnosti
      musí partner získat nový pomocí zdroje `/authentication/v1/partner`.


      - pokud partner nezadá přístupový token, obdrží chybu `401 Unauthorized` a
      následující tělo odpovědi:


      ```

      {
         &quot;error_description&quot;: &quot;The access token is missing&quot;,
         &quot;error&quot;: &quot;invalid_request&quot;
      }

      ```


      - pokud partner poskytne neplatný přístupový token, obdrží chybu `401
      Unauthorized` a následující tělo odpovědi:


      ```

      {
          &quot;error_description&quot;:&quot;The access token is invalid or has expired&quot;,
          &quot;error&quot;:&quot;invalid_token&quot;
      }

      ```


      &gt; DŮLEŽITÁ POZNÁMKA: Partner musí svůj přístupový token a přihlašovací
      údaje uchovávat v bezpečí. Přihlašovací údaje ani přístupový token NESMÍ
      být nikdy vloženy na stránku klienta. Pokud partner plánuje integrovat
      volání API do toku zákazníků bez odeslání stránky na server, měl by
      implementovat koncový bod REST vázaný na relaci nákupního košíku partnera,
      který bude použit jako proxy pro volání HC API.


      &gt; NIKDY nepřenášejte přístupový token ani přihlašovací údaje přes
      prosté HTTP. Takové požadavky budou odmítnuty.
  - name: Application resources
    description: Služby, které umožňují zpracování *aplikace* během celého jejího
      životního cyklu.
  - name: Health check
    description: >-
      Chcete-li snadno zjistit aktuální stav API, použijte [zdroj pro kontrolu
      stavu API](./api-status-check).

      Chcete-li zkontrolovat dostupnost backendových služeb, použijte [zdroj pro
      kontrolu stavu](./api-health-check).
  - name: Scoring resources
    description: Služby, které umožňují partnerským e-shopům zjistit pravděpodobnost
      schválení *žádosti*.
  - name: Installments calculator resources
    description: >-
      Pokud chcete svému zákazníkovi (který chce zaplatit za nákup pomocí úvěru)
      nabídnout možnost vybrat si z dostupných splátkových programů, zatímco je
      ještě na vašem webu, je nutné implementovat "kalkulačku splátek“.


      Vyberte si jeden z následujících přístupů k integraci kalkulačky splátek
      do vaší webové stránky:


      - A) Implementace vlastní kalkulačky splátek s vaším FE ve vašem designu,
      který využívá určené API zdroje ([popis
      níže](#implementing-own-installments-calculator)).


      - B) Integrace javascriptového widgetu Home Credit (popsaného v [speciální
      kapitole](./java-script-widget-integration)), který:
        - poskytuje GUI a front-endové funkce
        - zpracovává všechny potřebné výpočty
        - poskytuje potřebná data back-endu e-shopu, aby je bylo možné snadno použít v rámci [*žádosti o vytvoření aplikace](./create-application)

      &gt; POZNÁMKA: Implementace kalkulačky splátek je volitelná. Zákazníci
      mohou vždy použít kalkulačku splátek zabudovanou do front-endu Home
      Credit.


      ## Implementace vlastní kalkulačky splátek


      K implementaci vlastní kalkulačky splátek (s vaším designem GUI) budete
      potřebovat následující zdroje:


      - `/financing/v3/installmentProgramsOffers` - k vyhledání dostupných
      nabídek splátkových programů a jejich podrobností


      - `/financing/v3/installmentPrograms` - pro zjištění podrobností o
      vybraném splátkovém programu


      - `/financing/v3/installmentProgramsDownPayments` - pro zjištění možností
      zálohy v rámci dostupných nabídek splátkových programů
  - name: JavaScript widget integration
    description: Aby bylo možné používat javascriptový widget Home Credit jako
      kalkulačku splátek, musí být správně nakonfigurován back-end vašeho
      e-shopu. Jak na to, je v současné době popsáno v [našem online
      repozitáři](https://github.com/homecreditcz/widget-calculator) (v současné
      době napsáno v češtině).
  - name: Merchantsite resources
    description: >-
      Služby, které by měly být vyvinuty a zpřístupněny partnerskými e-shopy,
      aby HC mohlo asynchronně informovat tyto partnerské e-shopy o důležitých
      změnách týkajících se konkrétních *aplikací* a *objednávek*


      &gt; **POZOR:** Tato sada API není zpřístupněna z HC. Místo toho by měla
      být vyvinuta partnerem a přijímat níže uvedené volání.
