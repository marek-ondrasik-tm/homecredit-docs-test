                          type: object
                          properties:
                            gatewayRedirectUrl:
                              type: string
                              description: URL přesměrování brány. Partner BY MĚL přesměrovat zákazníka na
                                tuto adresu, aby mohl pokračovat v procesu
                                schvalování žádosti.
                          required:
                            - gatewayRedirectUrl
                          description: Data pro krok pracovního postupu `REDIRECT`
                      required:
                        - code
                        - priority
                        - mandatory
                    description: Soubor aktuálně dostupných akcí v rámci procesu podávání žádostí.
                required:
                  - id
                  - status
              examples:
                response:
                  value:
                    id: 123e4567-e89b-12d3-a456-426655440000
                    status: CREATED
                    workflowSteps:
                      - code: REDIRECT
                        priority: 1
                        mandatory: true
                        redirect:
                          gatewayRedirectUrl: https://nasplatky.homecredit.cz
        "201":
          description: Aplikace byla vytvořena
          headers: {}
          content:
            application/json;charset=UTF-8:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Primární identifikátor aplikace
                  status:
                    type: string
                    enum:
