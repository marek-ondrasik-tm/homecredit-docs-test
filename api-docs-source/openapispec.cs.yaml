            identifikaci položky pro budoucí změny. Maximálně 100 znaků.
        ean:
          type: string
          example: "888462064002"
          description: Kód EAN. Maximálně 32 znaků.
        name:
          type: string
          example: iPhone 6s 32GB SpaceGray
          description: Název položky. Řetězcové hodnoty delší než 60 znaků budou zkráceny
            na 60 znaků.
        quantity:
          type: number
          example: 1
          description: Počet položek. Pokud je pole prázdné, považuje se za 1.
        type:
          type: string
          enum:
            - PHYSICAL
            - DISCOUNT
            - SHIPPING_FEE
            - SALES_TAX
            - DIGITAL
            - GIFT_CARD
            - STORE_CREDIT
            - FEE
            - INSURANCE
          description: Typ položky
        totalPrice:
          $ref: "#/components/schemas/Amount"
        unitPrice:
          $ref: "#/components/schemas/Amount"
        producer:
          type: string
          example: "'Apple'"
          description: Nesmí být delší než 50 znaků.
        image:
          $ref: "#/components/schemas/File"
    OrderFinancing:
      type: object
      required:
        - type
        - installment
